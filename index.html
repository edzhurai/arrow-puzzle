<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Arrow Puzzle</title>
<!-- force rebuild -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  #hdr {
    position: fixed; top: 0; left: 0; right: 0;
    height: 44px; box-sizing: border-box;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    z-index: 25; color: #fff; font-family: sans-serif;
    pointer-events: none; overflow: hidden;
  }
  @supports (padding: env(safe-area-inset-right)) {
    #hdr { padding-right: calc(16px + env(safe-area-inset-right)); padding-left: calc(16px + env(safe-area-inset-left)); }
  }
  #hdr > * { pointer-events: auto; }
  #lvl { font-size: 14px; font-weight: bold; white-space: nowrap; }
  #err { font-size: 13px; color: rgba(255,255,255,0.7); white-space: nowrap; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  #hdr-r { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .hdr-btn {
    background: rgba(255,255,255,0.15); border: none; border-radius: 6px;
    color: #fff; font-size: 13px; padding: 5px 8px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.3); }
  .hdr-btn.btn-active { background: rgba(255,255,255,0.5); }
  #gear {
    width: 30px; height: 30px;
    background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
    color: #fff; font-size: 16px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  #gear:hover { background: rgba(255,255,255,0.3); }
  #gear.btn-active { background: rgba(255,255,255,0.5); }
  #clear-screen {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26,26,46,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 15; color: #fff; font-family: sans-serif;
  }
  .cs { text-align: center; }
  .cs-lvl { font-size: 48px; font-weight: bold; margin-bottom: 8px; }
  .cs-err { font-size: 20px; color: rgba(255,255,255,0.6); margin-bottom: 28px; }
  .cs button {
    background: #e94560; border: none; border-radius: 8px;
    color: #fff; font-size: 18px; padding: 12px 32px; cursor: pointer;
    transition: background 0.15s;
  }
  .cs button:hover { background: #d63850; }
  .cs button.btn-active { background: #ff6b8a; }
  #panel {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
  }
  .pi {
    background: #1a1a2e; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px; padding: 24px; color: #fff;
    font-family: sans-serif; min-width: 260px; max-height: 90vh; overflow-y: auto;
  }
  .pi h2 { margin-bottom: 12px; font-size: 18px; }
  .pi .gl { display: block; margin-top: 14px; margin-bottom: 4px; font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
  .pi label { display: block; padding: 3px 0; font-size: 14px; cursor: pointer; }
  .pi input[type=radio] { margin-right: 6px; }
  .pi .btns { display: flex; gap: 10px; margin-top: 20px; }
  .pi button {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    color: #fff; font-size: 15px; cursor: pointer;
  }
  .pi .apply { background: #e94560; }
  .pi .apply:hover { background: #d63850; }
  .pi .cancel { background: rgba(255,255,255,0.15); }
  .pi .cancel:hover { background: rgba(255,255,255,0.25); }
  .pi .how-to-play {
    display: block; width: 100%; margin-top: 16px; padding: 8px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: rgba(255,255,255,0.6); font-size: 14px;
    cursor: pointer; text-align: center;
  }
  .pi .how-to-play:hover { background: rgba(255,255,255,0.15); color: #fff; }
  #devpanel {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 25;
  }
  .dp {
    background: #0a0a1a; border: 1px solid #e94560;
    border-radius: 12px; padding: 24px; color: #fff;
    font-family: monospace; min-width: 320px; max-height: 90vh; overflow-y: auto;
  }
  .dp h2 { margin-bottom: 12px; font-size: 16px; color: #e94560; }
  .dp label { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; }
  .dp input[type=number] {
    width: 60px; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px; color: #fff; padding: 4px 6px; font-family: monospace; font-size: 13px;
  }
  .dp select {
    background: #1a1a2e; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px; color: #fff; padding: 4px 6px; font-family: monospace; font-size: 13px;
  }
  .dp .dp-section { margin-top: 12px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); }
  .dp .dp-cb { display: flex; align-items: center; gap: 6px; padding: 6px 0; font-size: 13px; cursor: pointer; }
  .dp .dp-cb input { margin: 0; }
  .dp .btns { display: flex; gap: 6px; margin-top: 16px; }
  .dp button {
    flex: 1; padding: 8px; border: none; border-radius: 6px;
    color: #fff; font-size: 13px; font-family: monospace; cursor: pointer;
  }
  .dp .gen { background: #e94560; }
  .dp .time { background: #2d6a4f; }
  .dp .restore { background: #2d4a6f; }
  .dp .close { background: rgba(255,255,255,0.15); }
  #dev-sidebar {
    position: fixed; top: 50px; left: 0; bottom: 0; width: 140px;
    background: rgba(10,10,26,0.85); border-right: 1px solid rgba(233,69,96,0.3);
    color: rgba(255,255,255,0.7); font: 11px/1.6 monospace;
    padding: 8px 6px; z-index: 5; pointer-events: none;
    overflow: hidden;
  }
  #dev-pw {
    position: fixed; top: 44px; left: 16px;
    background: #0a0a1a; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 8px 10px;
    display: flex; align-items: center; gap: 6px;
    z-index: 30; font-family: monospace;
  }
  #dev-pw input {
    width: 80px; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px; color: #fff; padding: 4px 6px;
    font-family: monospace; font-size: 12px; outline: none;
  }
  #dev-wm {
    position: fixed; bottom: 8px; right: 8px; color: rgba(233,69,96,0.5);
    font: bold 12px monospace; z-index: 5; pointer-events: none;
  }
  #start-screen {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }
  #start-screen button {
    background: #e94560; border: none; border-radius: 12px;
    color: #fff; font-size: 24px; padding: 16px 48px; cursor: pointer;
    transition: background 0.15s;
  }
  #start-screen button:hover { background: #d63850; }
  #start-screen button.btn-active { background: #ff6b8a; }
  #gen-timer {
    font-size: 13px; color: rgba(255,255,255,0.5); white-space: nowrap;
    font-family: monospace;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="start-screen"><button onclick="startGame()">Start</button></div>
<div id="hdr" style="display:none">
  <span id="lvl">Level 1</span>
  <button class="hdr-btn" onclick="showDevPw()" style="font-size:10px;padding:3px 6px;opacity:0.5">DEV</button>
  <span id="err">Errors: 0</span>
  <span id="gen-timer"></span>
  <div id="hdr-r">
    <button class="hdr-btn" onclick="resetCam();render()">&#8634;</button>
    <button id="hint-btn" class="hdr-btn" onclick="useHint()">Hint</button>
    <button id="gear" onclick="toggleSettings()">&#9881;</button>
  </div>
</div>
<div id="clear-screen" style="display:none">
  <div class="cs">
    <div class="cs-lvl">Level 1</div>
    <div class="cs-err">0 Errors</div>
    <div class="cs-cov" style="font-size:16px;color:rgba(255,255,255,0.5);margin-bottom:20px"></div>
    <button onclick="this.classList.add('btn-active');setTimeout(nextLevel,400)">Next Level</button>
  </div>
</div>
<div id="dev-pw" style="display:none"><input type="password" id="dev-pw-input" placeholder="password"></div>
<div id="dev-wm" style="display:none">DEV</div>
<div id="panel" style="display:none">
  <div class="pi">
    <h2>Settings</h2>
    <span class="gl">Difficulty</span>
    <label><input type="radio" name="difficulty" value="easy"> Easy</label>
    <label><input type="radio" name="difficulty" value="medium"> Medium</label>
    <label><input type="radio" name="difficulty" value="hard"> Hard</label>
    <label><input type="radio" name="difficulty" value="expert"> Expert</label>
    <span class="gl">Color</span>
    <label><input type="radio" name="color" value="multi"> Multicolor</label>
    <label><input type="radio" name="color" value="mono"> Monochrome</label>
    <label><input type="radio" name="color" value="bw"> Black &amp; White</label>
    <span class="gl">Dots</span>
    <label><input type="radio" name="dots" value="show"> Show</label>
    <label><input type="radio" name="dots" value="hide"> Hide</label>
    <button class="how-to-play" onclick="alert('How to Play — coming soon!')">How to Play</button>
    <div class="btns">
      <button class="cancel" onclick="document.getElementById('panel').style.display='none'">Cancel</button>
      <button class="apply" onclick="applySettings()">Apply</button>
    </div>
  </div>
</div>
<div id="devpanel" style="display:none">
  <div class="dp">
    <h2>DEV: Generation Parameters</h2>
    <label>Grid cols <input type="number" id="dp-cols" min="5" max="50" value="15"></label>
    <label>Grid rows <input type="number" id="dp-rows" min="5" max="50" value="15"></label>
    <label>Min segment <input type="number" id="dp-minseg" min="1" max="10" value="1"></label>
    <label>Max segment <input type="number" id="dp-maxseg" min="1" max="10" value="5"></label>
    <label>Min bends <input type="number" id="dp-minbends" min="0" max="8" value="0"></label>
    <label>Max bends <input type="number" id="dp-maxbends" min="0" max="8" value="4"></label>
    <label>Fill mode <select id="dp-fill"><option value="normal">Normal</option><option value="full">Full</option></select></label>
    <label>Nmin min <input type="number" id="dp-nmin-min" min="0" max="20" value="2"></label>
    <label>Nmin max <input type="number" id="dp-nmin-max" min="0" max="20" value="4"></label>
    <label>Timeout (s) <input type="number" id="dp-timeout" min="1" max="30" value="5"></label>
    <label>Color <select id="dp-color"><option value="">Use Settings</option><option value="multi">Multicolor</option><option value="mono">Monochrome</option><option value="bw">B&amp;W</option></select></label>
    <label>Dots <select id="dp-dots"><option value="">Use Settings</option><option value="show">Show</option><option value="hide">Hide</option></select></label>
    <div class="dp-section">
      <label class="dp-cb"><input type="checkbox" id="dp-preserve"> Preserve on refresh</label>
    </div>
    <div class="btns">
      <button class="close" onclick="closeDevPanel()">Close</button>
      <button class="restore" onclick="devRestoreFromSettings()">Restore</button>
      <button class="time" onclick="devTimeIt()">Time It</button>
      <button class="gen" onclick="devGenerate()">Generate</button>
    </div>
  </div>
</div>
<div id="dev-sidebar" style="display:none"></div>
<script>
  let devMode = false;
  let devParams = { cols: 15, rows: 15, fill: 'normal', arrows: 35, minSeg: 1, maxSeg: 5, minBends: 0, maxBends: 4, nminMin: 2, nminMax: 4, timeout: 5, color: '', dots: '' };
  let isLayingOut = false;

  const DIFFICULTY_PRESETS = {
    easy:   { grid: 10, fill: 'normal', arrows: 15, bends: 'simple',  nminMin: 8,  nminMax: 12, minSeg: 2, maxSeg: 4, timeout: 5 },
    medium: { grid: 15, fill: 'normal', arrows: 35, bends: 'complex', nminMin: 4,  nminMax: 7,  minSeg: 1, maxSeg: 5, timeout: 5 },
    hard:   { grid: 20, fill: 'full',   arrows: 55, bends: 'complex', nminMin: 2,  nminMax: 4,  minSeg: 1, maxSeg: 5, timeout: 5 },
    expert: { grid: 25, fill: 'full',   arrows: 80, bends: 'complex', nminMin: 1,  nminMax: 2,  minSeg: 1, maxSeg: 5, timeout: 8 },
  };
  const DEFAULTS = { difficulty: 'medium', color: 'mono', dots: 'show' };
  const saved = localStorage.getItem('arrowPuzzleSettings');
  let settings = saved ? Object.assign({}, DEFAULTS, JSON.parse(saved)) : Object.assign({}, DEFAULTS);
  if (!DIFFICULTY_PRESETS[settings.difficulty]) settings.difficulty = 'medium';

  function getEffectiveParams() {
    if (devMode) {
      const dp = devParams;
      const arrows = Math.round(dp.cols * dp.rows * 0.15);
      return { cols: dp.cols, rows: dp.rows, fill: dp.fill, arrows: arrows,
               minSeg: dp.minSeg, maxSeg: dp.maxSeg, minBends: dp.minBends, maxBends: dp.maxBends,
               nminMin: dp.nminMin, nminMax: dp.nminMax, timeout: dp.timeout,
               color: dp.color || settings.color, dots: dp.dots || settings.dots };
    }
    const p = DIFFICULTY_PRESETS[settings.difficulty];
    return { cols: p.grid, rows: p.grid, fill: p.fill, arrows: p.arrows,
             minSeg: p.minSeg, maxSeg: p.maxSeg, minBends: 0, maxBends: p.bends === 'simple' ? 2 : 4,
             nminMin: p.nminMin, nminMax: p.nminMax, timeout: p.timeout,
             color: settings.color, dots: settings.dots };
  }

  let ep = getEffectiveParams();
  let N = ep.arrows;
  let COLS = ep.cols, ROWS = ep.rows;
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let spacing, originX, originY;
  let arrows = [];
  let cleared = false;
  let camScale = 1, camOffX = 0, camOffY = 0;
  const anims = new Map();
  let animLoop = null;
  let level = 1, errors = 0, hints = 0, lastCoverage = 100;
  let hintTimer = null;
  let lastWinW = 0, lastWinH = 0;
  let genTimerInterval = null, genStartTime = 0;

  function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

  function layout() {
    if (isLayingOut) return;
    isLayingOut = true;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    lastWinW = canvas.width; lastWinH = canvas.height;
    const usableW = canvas.width * 0.70;
    const usableH = canvas.height * 0.70;
    spacing = Math.min(usableW / (COLS - 1), usableH / (ROWS - 1));
    originX = (canvas.width - (COLS - 1) * spacing) / 2;
    originY = (canvas.height - (ROWS - 1) * spacing) / 2;
    isLayingOut = false;
  }

  function gx(col) { return originX + col * spacing; }
  function gy(row) { return originY + row * spacing; }

  function drawDots() {
    const ep = getEffectiveParams();
    if (ep.dots === 'hide') return;
    const r = Math.max(2, spacing * 0.04);
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        ctx.beginPath();
        ctx.arc(gx(col), gy(row), r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function headDir(a) {
    const p = a.path;
    const last = p[p.length - 1];
    const prev = p[p.length - 2];
    const dc = last.c - prev.c;
    const dr = last.r - prev.r;
    if (dc === 0 && dr < 0) return 0;
    if (dc > 0 && dr === 0) return 1;
    if (dc === 0 && dr > 0) return 2;
    return 3;
  }

  function generateArrow(numBends, occupied, opts) {
    const oMinSeg = (opts && opts.minSeg) || 1;
    const oMaxSeg = (opts && opts.maxSeg) || 5;
    for (let attempt = 0; attempt < 200; attempt++) {
      const path = [];
      const visited = new Set();
      let col = randInt(1, COLS - 2);
      let row = randInt(1, ROWS - 2);
      let dir = randInt(0, 3);
      let valid = true;

      const key0 = `${col},${row}`;
      if (occupied && occupied.has(key0)) continue;
      path.push({ c: col, r: row });
      visited.add(key0);

      const segLens = [];
      for (let seg = 0; seg <= numBends; seg++) {
        let maxSteps;
        switch (dir) {
          case 0: maxSteps = row; break;
          case 1: maxSteps = COLS - 1 - col; break;
          case 2: maxSteps = ROWS - 1 - row; break;
          case 3: maxSteps = col; break;
        }
        if (maxSteps < 1) { valid = false; break; }
        const minSteps = Math.max(oMinSeg, seg >= 2 ? segLens[seg - 2] + 1 : 1);
        if (minSteps > maxSteps) { valid = false; break; }
        const maxSeg = Math.min(maxSteps, oMaxSeg);
        if (minSteps > maxSeg) { valid = false; break; }
        const steps = Math.random() < 0.6 ? randInt(minSteps, Math.min(maxSeg, Math.max(minSteps, 2))) : randInt(minSteps, maxSeg);
        segLens.push(steps);

        for (let s = 1; s <= steps; s++) {
          const nc = col + DX[dir] * s;
          const nr = row + DY[dir] * s;
          const key = `${nc},${nr}`;
          if (visited.has(key) || (occupied && occupied.has(key))) { valid = false; break; }
          visited.add(key);
          path.push({ c: nc, r: nr });
        }
        if (!valid) break;

        col += DX[dir] * steps;
        row += DY[dir] * steps;

        if (seg < numBends) {
          dir = Math.random() < 0.5 ? (dir + 1) % 4 : (dir + 3) % 4;
        }
      }

      if (valid && path.length >= 2) {
        const last = path[path.length - 1];
        const prev = path[path.length - 2];
        const hdc = Math.sign(last.c - prev.c);
        const hdr = Math.sign(last.r - prev.r);
        const headProj = hdc * last.c + hdr * last.r;
        let extremeOk = true;
        for (const p of path) {
          if (hdc * p.c + hdr * p.r > headProj) { extremeOk = false; break; }
        }
        if (extremeOk) return { path, alive: true, stuck: false, glowing: false };
      }
    }
    return null;
  }

  function headsConflict(a, b) {
    const da = headDir(a);
    const db = headDir(b);
    if ((da + 2) % 4 !== db) return false;
    const ha = a.path[a.path.length - 1];
    const hb = b.path[b.path.length - 1];
    if (da === 0 || da === 2) return ha.c === hb.c;
    return ha.r === hb.r;
  }

  function isSolvable(list) {
    const remaining = list.map(a => ({ path: a.path, dir: headDir(a) }));
    while (remaining.length > 0) {
      let found = false;
      for (let i = 0; i < remaining.length; i++) {
        const a = remaining[i];
        const head = a.path[a.path.length - 1];
        const otherDots = new Set();
        for (let j = 0; j < remaining.length; j++) {
          if (j === i) continue;
          for (const p of remaining[j].path) otherDots.add(`${p.c},${p.r}`);
        }
        let blocked = false;
        let c = head.c + DX[a.dir], r = head.r + DY[a.dir];
        while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
          if (otherDots.has(`${c},${r}`)) { blocked = true; break; }
          c += DX[a.dir]; r += DY[a.dir];
        }
        if (!blocked) {
          remaining.splice(i, 1);
          found = true;
          break;
        }
      }
      if (!found) return false;
    }
    return true;
  }

  function generateFiller(occupied, uncovered) {
    const shuffled = [...uncovered].sort(() => Math.random() - 0.5);
    const fillers = [];
    const used = new Set(occupied);
    for (const key of shuffled) {
      if (used.has(key)) continue;
      const [c, r] = key.split(',').map(Number);
      const dirs = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
      let placed = false;
      for (const dir of dirs) {
        const len = Math.random() < 0.5 ? 1 : 2;
        const path = [{ c, r }];
        let valid = true;
        for (let s = 1; s <= len; s++) {
          const nc = c + DX[dir] * s;
          const nr = r + DY[dir] * s;
          if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) { valid = false; break; }
          const nk = `${nc},${nr}`;
          if (used.has(nk)) { valid = false; break; }
          path.push({ c: nc, r: nr });
        }
        if (!valid) continue;
        const last = path[path.length - 1];
        const prev = path[path.length - 2];
        const hdc = Math.sign(last.c - prev.c);
        const hdr = Math.sign(last.r - prev.r);
        const headProj = hdc * last.c + hdr * last.r;
        let extremeOk = true;
        for (const p of path) {
          if (hdc * p.c + hdr * p.r > headProj) { extremeOk = false; break; }
        }
        if (!extremeOk) continue;
        for (const p of path) used.add(`${p.c},${p.r}`);
        fillers.push({ path, alive: true, stuck: false, glowing: false });
        placed = true;
        break;
      }
      if (!placed) {
        for (const dir of dirs) {
          const nc = c + DX[dir];
          const nr = r + DY[dir];
          if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
          const nk = `${nc},${nr}`;
          if (used.has(nk)) continue;
          const path = [{ c, r }, { c: nc, r: nr }];
          for (const p of path) used.add(`${p.c},${p.r}`);
          fillers.push({ path, alive: true, stuck: false, glowing: false });
          placed = true;
          break;
        }
      }
    }
    return fillers;
  }

  function tryExtendArrow(arrow, dot, allArrows, occupied) {
    const tail = arrow.path[0];
    if (Math.abs(dot.c - tail.c) + Math.abs(dot.r - tail.r) !== 1) return false;
    const newPath = [{ c: dot.c, r: dot.r }, ...arrow.path];
    const last = newPath[newPath.length - 1];
    const prev = newPath[newPath.length - 2];
    const hdc = Math.sign(last.c - prev.c);
    const hdr = Math.sign(last.r - prev.r);
    const headProj = hdc * last.c + hdr * last.r;
    for (const p of newPath) {
      if (hdc * p.c + hdr * p.r > headProj) return false;
    }
    arrow.path = newPath;
    occupied.add(`${dot.c},${dot.r}`);
    return true;
  }

  function countFree(list) {
    const dots = new Set();
    const dirs = [];
    for (let i = 0; i < list.length; i++) {
      dirs.push(headDir(list[i]));
      for (const p of list[i].path) dots.add(`${p.c},${p.r}`);
    }
    let free = 0;
    for (let i = 0; i < list.length; i++) {
      const head = list[i].path[list[i].path.length - 1];
      const d = dirs[i];
      let blocked = false;
      let c = head.c + DX[d], r = head.r + DY[d];
      while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
        if (dots.has(`${c},${r}`)) {
          let self = false;
          for (const p of list[i].path) { if (p.c === c && p.r === r) { self = true; break; } }
          if (!self) { blocked = true; break; }
        }
        c += DX[d]; r += DY[d];
      }
      if (!blocked) free++;
    }
    return free;
  }

  function fillPhaseConstrained(target, occupied, generated, bendMin, bendMax, opts, minNmin) {
    let stalls = 0;
    let dbgNoCandidate = 0, dbgConflict = 0, dbgNminReject = 0, dbgPlaced = 0;
    const label = 'fillPhase(bends=' + bendMin + '-' + bendMax + ' seg=' + (opts&&opts.minSeg||1) + '-' + (opts&&opts.maxSeg||5) + ' target=' + target + ')';
    console.log(label + ' START: ' + generated.length + ' arrows, ' + occupied.size + ' dots occupied');
    while (occupied.size < target && stalls < 100) {
      let placed = false;
      for (let retry = 0; retry < 80; retry++) {
        const bends = randInt(bendMin, bendMax);
        const candidate = generateArrow(bends, occupied, opts);
        if (!candidate) { dbgNoCandidate++; continue; }
        let conflict = false;
        for (const existing of generated) {
          if (headsConflict(candidate, existing)) { conflict = true; break; }
        }
        if (conflict) { dbgConflict++; continue; }

        generated.push(candidate);
        for (const p of candidate.path) occupied.add(`${p.c},${p.r}`);

        const nmin = countFree(generated);
        if (generated.length >= 10 && nmin < minNmin) {
          dbgNminReject++;
          generated.pop();
          for (const p of candidate.path) occupied.delete(`${p.c},${p.r}`);
          continue;
        }
        placed = true;
        dbgPlaced++;
        break;
      }
      if (!placed) { stalls++; continue; }
      stalls = 0;
    }
    console.log(label + ' END: placed=' + dbgPlaced + ' arrows=' + generated.length + ' dots=' + occupied.size + '/' + target + ' rejects: noCandidate=' + dbgNoCandidate + ' conflict=' + dbgConflict + ' nmin=' + dbgNminReject + ' stalls=' + stalls);
  }

  async function placeArrowsFull() {
    const ep = getEffectiveParams();
    const timeoutMs = ep.timeout * 1000;
    console.log('placeArrowsFull: generating full coverage for ' + COLS + 'x' + ROWS + ' grid (timeout=' + ep.timeout + 's)');
    const totalDots = COLS * ROWS;
    const maxAttempts = 300;
    const startTime = Date.now();
    let stats = { coverageFail: 0, conflictFail: 0, solveFail: 0 };
    let best = null, bestCov = 0;

    for (let puzzleAttempt = 0; puzzleAttempt < maxAttempts; puzzleAttempt++) {
      if (puzzleAttempt % 5 === 0) await new Promise(r => setTimeout(r, 0));
      if (Date.now() - startTime > timeoutMs) {
        console.warn('placeArrowsFull: 5s timeout after ' + puzzleAttempt + ' attempts');
        break;
      }
      const occupied = new Set();
      const all = [];
      const log = puzzleAttempt < 3;

      fillPhaseConstrained(Math.floor(totalDots * 0.40), occupied, all, 1, 2, { minSeg: 3, maxSeg: 6 }, 2);
      if (log) console.log('  #' + puzzleAttempt + ' P1: ' + all.length + ' arrows, ' + occupied.size + '/' + totalDots);

      fillPhaseConstrained(Math.floor(totalDots * 0.70), occupied, all, 1, 2, { minSeg: 2, maxSeg: 4 }, 2);
      if (log) console.log('  #' + puzzleAttempt + ' P2: ' + all.length + ' arrows, ' + occupied.size + '/' + totalDots);

      fillPhaseConstrained(Math.floor(totalDots * 0.90), occupied, all, 0, 1, { minSeg: 1, maxSeg: 3 }, 2);
      if (log) console.log('  #' + puzzleAttempt + ' P3: ' + all.length + ' arrows, ' + occupied.size + '/' + totalDots);

      fillPhaseConstrained(totalDots, occupied, all, 0, 0, { minSeg: 1, maxSeg: 2 }, 2);
      if (log) console.log('  #' + puzzleAttempt + ' P4: ' + all.length + ' arrows, ' + occupied.size + '/' + totalDots);

      // Phase 5: Unconstrained fillers for remaining gaps
      const uncovered = new Set();
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (!occupied.has(`${c},${r}`)) uncovered.add(`${c},${r}`);
      if (uncovered.size > 0) {
        const fillers = generateFiller(occupied, uncovered);
        for (const f of fillers) all.push(f);
        occupied.clear();
        for (const a of all) for (const p of a.path) occupied.add(`${p.c},${p.r}`);
      }

      // Phase 6: Aggressive tail extensions
      let progress = true;
      while (progress && occupied.size < totalDots) {
        progress = false;
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++) {
            if (occupied.has(`${c},${r}`)) continue;
            for (const a of all)
              if (tryExtendArrow(a, { c, r }, all, occupied)) { progress = true; break; }
          }
      }

      if (occupied.size > bestCov) {
        let candidateConflict = false;
        for (let i = 0; i < all.length && !candidateConflict; i++)
          for (let j = i + 1; j < all.length && !candidateConflict; j++)
            if (headsConflict(all[i], all[j])) candidateConflict = true;
        if (!candidateConflict) {
          best = all.map(a => ({ path: a.path.slice(), alive: true, stuck: false, glowing: false }));
          bestCov = occupied.size;
        }
      }

      if (occupied.size < totalDots) { stats.coverageFail++; continue; }

      let hasConflict = false;
      for (let i = 0; i < all.length && !hasConflict; i++)
        for (let j = i + 1; j < all.length && !hasConflict; j++)
          if (headsConflict(all[i], all[j])) hasConflict = true;
      if (hasConflict) { stats.conflictFail++; continue; }

      if (!isSolvable(all)) { stats.solveFail++; continue; }

      arrows = all;
      lastCoverage = 100;
      console.log('Full coverage generated (#' + puzzleAttempt + ', ' + arrows.length + ' arrows, ' + bestCov + '/' + totalDots + ', solvable=true)');
      cleared = false;
      return;
    }

    if (best) {
      let hasConflict = false;
      for (let i = 0; i < best.length && !hasConflict; i++)
        for (let j = i + 1; j < best.length && !hasConflict; j++)
          if (headsConflict(best[i], best[j])) hasConflict = true;
      if (hasConflict) {
        console.warn('Full coverage fallback rejected: head-on conflict detected, falling back to normal');
        lastCoverage = 100;
        await placeArrowsNormal();
        return;
      }
      arrows = best;
      lastCoverage = Math.round(bestCov / totalDots * 1000) / 10;
      console.warn('Full coverage fallback: ' + arrows.length + ' arrows, ' + bestCov + '/' + totalDots + ' (' + lastCoverage + '%). stats: coverage=' + stats.coverageFail + ' conflict=' + stats.conflictFail + ' solve=' + stats.solveFail);
      cleared = false;
    } else {
      lastCoverage = 100;
      await placeArrowsNormal();
    }
  }

  async function placeArrowsNormal() {
    const ep = getEffectiveParams();
    const segOpts = { minSeg: ep.minSeg, maxSeg: ep.maxSeg };
    const maxAttempts = 200;
    for (let puzzleAttempt = 0; puzzleAttempt < maxAttempts; puzzleAttempt++) {
      if (puzzleAttempt % 10 === 0) await new Promise(r => setTimeout(r, 0));
      const occupied = new Set();
      const generated = [];
      let success = true;

      for (let n = 0; n < N; n++) {
        let placed = false;
        for (let retry = 0; retry < 50; retry++) {
          const bends = randBends();
          const candidate = generateArrow(bends, occupied, segOpts);
          if (!candidate) continue;
          let conflict = false;
          for (const existing of generated) {
            if (headsConflict(candidate, existing)) { conflict = true; break; }
          }
          if (!conflict) {
            generated.push(candidate);
            for (const p of candidate.path) occupied.add(`${p.c},${p.r}`);
            placed = true;
            break;
          }
        }
        if (!placed) { success = false; break; }
      }

      if (success && generated.length >= Math.ceil(N / 2) && isSolvable(generated)) {
        if (generated.length < N) console.warn('Placed ' + generated.length + '/' + N + ' arrows');
        arrows = generated;
        if (puzzleAttempt >= 50) console.warn('Puzzle generation took ' + (puzzleAttempt + 1) + ' attempts');
        console.log('Puzzle generated (' + puzzleAttempt + ' attempts, ' + arrows.length + ' arrows):');
        for (let i = 0; i < arrows.length; i++) {
          console.log('  Arrow ' + i + ' (' + arrows[i].path.length + ' dots, head dir=' + headDir(arrows[i]) + '):',
            arrows[i].path.map(p => `(${p.c},${p.r})`).join(' → '));
        }
        cleared = false;
        return;
      }
    }
    console.warn('Could not generate puzzle with >= ' + Math.ceil(N / 2) + ' arrows, reducing target');
    N = Math.max(1, Math.ceil(N / 2));
    await placeArrowsNormal();
  }

  async function placeArrows() {
    const ep = getEffectiveParams();
    console.log('placeArrows: COLS=' + COLS + ' ROWS=' + ROWS + ' fill=' + ep.fill + ' devMode=' + devMode);
    if (ep.fill === 'full') await placeArrowsFull();
    else await placeArrowsNormal();
    const _cov = new Set();
    for (const a of arrows) for (const p of a.path) _cov.add(`${p.c},${p.r}`);
    console.log('Generated: ' + arrows.length + ' arrows, ' + _cov.size + '/' + (COLS * ROWS) + ' dots (' + (_cov.size / (COLS * ROWS) * 100).toFixed(1) + '%), Nmin=' + countFree(arrows));
  }

  function drawArrow(a, offX, offY, color, glow) {
    const p = a.path;
    const lineW = Math.max(3, spacing * 0.1);
    const headLen = Math.max(6, spacing * 0.18);
    const headW = Math.max(5, spacing * 0.12);
    const dir = headDir(a);
    const perpX = -DY[dir];
    const perpY = DX[dir];

    const tipX = gx(p[p.length - 1].c) + offX;
    const tipY = gy(p[p.length - 1].r) + offY;
    const baseX = tipX - DX[dir] * headLen;
    const baseY = tipY - DY[dir] * headLen;

    if (glow) {
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = spacing * 0.4;
    }

    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(gx(p[0].c) + offX, gy(p[0].r) + offY);
    for (let i = 1; i < p.length - 1; i++) {
      ctx.lineTo(gx(p[i].c) + offX, gy(p[i].r) + offY);
    }
    ctx.lineTo(baseX, baseY);
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(baseX + perpX * headW, baseY + perpY * headW);
    ctx.lineTo(baseX - perpX * headW, baseY - perpY * headW);
    ctx.closePath();
    ctx.fill();

    if (glow) {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  }

  function posOnPath(path, dir, d) {
    const pathLen = path.length - 1;
    if (d <= 0) {
      return { x: gx(path[0].c), y: gy(path[0].r) };
    } else if (d >= pathLen) {
      const excess = d - pathLen;
      const head = path[path.length - 1];
      return {
        x: gx(head.c) + excess * DX[dir] * spacing,
        y: gy(head.r) + excess * DY[dir] * spacing
      };
    } else {
      const seg = Math.floor(d);
      const frac = d - seg;
      const x1 = gx(path[seg].c), y1 = gy(path[seg].r);
      const x2 = gx(path[seg + 1].c), y2 = gy(path[seg + 1].r);
      return { x: x1 + frac * (x2 - x1), y: y1 + frac * (y2 - y1) };
    }
  }

  function drawSlidingArrow(a, t, color, glow) {
    const p = a.path;
    const dir = headDir(a);
    const pts = [];
    for (let i = 0; i < p.length; i++) pts.push(posOnPath(p, dir, t + i));

    const lineW = Math.max(3, spacing * 0.1);
    const headLen = Math.max(6, spacing * 0.18);
    const headW = Math.max(5, spacing * 0.12);
    const tip = pts[pts.length - 1];
    const pre = pts[pts.length - 2];
    const hdx = tip.x - pre.x, hdy = tip.y - pre.y;
    const hlen = Math.sqrt(hdx * hdx + hdy * hdy) || 1;
    const ux = hdx / hlen, uy = hdy / hlen;
    const px = -uy, py = ux;
    const bx = tip.x - ux * headLen, by = tip.y - uy * headLen;

    if (glow) { ctx.shadowColor = '#ffffff'; ctx.shadowBlur = spacing * 0.4; }

    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length - 1; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.lineTo(bx, by);
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y);
    ctx.lineTo(bx + px * headW, by + py * headW);
    ctx.lineTo(bx - px * headW, by - py * headW);
    ctx.closePath();
    ctx.fill();

    if (glow) { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }
  }

  function flyDistance(a) {
    const dir = headDir(a);
    let maxDist = 0;
    for (const p of a.path) {
      let dist;
      switch (dir) {
        case 0: dist = p.r * spacing; break;
        case 1: dist = (COLS - 1 - p.c) * spacing; break;
        case 2: dist = (ROWS - 1 - p.r) * spacing; break;
        case 3: dist = p.c * spacing; break;
      }
      maxDist = Math.max(maxDist, dist);
    }
    return maxDist;
  }

  function hitTest(px, py, a) {
    for (let i = 0; i < a.path.length - 1; i++) {
      const x1 = gx(a.path[i].c), y1 = gy(a.path[i].r);
      const x2 = gx(a.path[i + 1].c), y2 = gy(a.path[i + 1].r);
      const dx = x2 - x1, dy = y2 - y1;
      const len2 = dx * dx + dy * dy;
      if (len2 === 0) continue;
      let t = ((px - x1) * dx + (py - y1) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const nx = x1 + t * dx, ny = y1 + t * dy;
      if (Math.sqrt((px - nx) ** 2 + (py - ny) ** 2) < Math.max(12, spacing * 0.45)) return true;
    }
    return false;
  }

  function render() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.setTransform(camScale, 0, 0, camScale, camOffX, camOffY);

    drawDots();

    ctx.save();
    const clipPad = spacing * 0.3;
    ctx.beginPath();
    ctx.rect(originX - clipPad, originY - clipPad, (COLS - 1) * spacing + clipPad * 2, (ROWS - 1) * spacing + clipPad * 2);
    ctx.clip();

    for (let i = 0; i < arrows.length; i++) {
      if (!arrows[i].alive || anims.has(i)) continue;
      let color = arrowColor(i);
      let glow = false;
      if (arrows[i].glowing) { color = '#ffffff'; glow = true; }
      else if (arrows[i].stuck) { color = '#ffffff'; }
      drawArrow(arrows[i], 0, 0, color, glow);
    }

    ctx.restore();

    for (const [i, anim] of anims) {
      if (!arrows[i].alive) continue;
      let color = arrowColor(i);
      let glow = false;
      if (arrows[i].glowing) { color = '#ffffff'; glow = true; }
      else if (arrows[i].stuck) { color = '#ffffff'; }
      if (anim.type === 'fly') {
        drawSlidingArrow(arrows[i], anim.slideT, color, glow);
      } else {
        drawArrow(arrows[i], anim.offX, anim.offY, color, glow);
      }
    }

    ctx.restore();
  }

  function startAnimLoop() {
    if (animLoop) return;
    function tick(now) {
      let anyActive = false;
      for (const [idx, anim] of anims) {
        let t = Math.min(1, (now - anim.startTime) / anim.duration);
        const et = t * t * (3 - 2 * t);
        if (anim.type === 'fly') {
          anim.slideT = et * anim.totalDist;
        } else {
          const phase = t < 0.5 ? t * 2 : 2 - t * 2;
          anim.offX = anim.dx * anim.bounceDist * phase;
          anim.offY = anim.dy * anim.bounceDist * phase;
        }
        if (t >= 1) {
          anims.delete(idx);
          if (anim.type === 'fly') {
            arrows[idx].alive = false;
          } else {
            arrows[idx].stuck = true;
          }
        } else {
          anyActive = true;
        }
      }
      render();
      if (anyActive || anims.size > 0) {
        animLoop = requestAnimationFrame(tick);
      } else {
        animLoop = null;
        if (arrows.every(a => !a.alive)) {
          cleared = true;
          render();
          showClearScreen();
        }
      }
    }
    animLoop = requestAnimationFrame(tick);
  }

  function fly(idx) {
    const a = arrows[idx];
    const dir = headDir(a);
    const pathLen = a.path.length - 1;
    const head = a.path[pathLen];
    let exitDist;
    switch (dir) {
      case 0: exitDist = head.r + 2; break;
      case 1: exitDist = COLS - 1 - head.c + 2; break;
      case 2: exitDist = ROWS - 1 - head.r + 2; break;
      case 3: exitDist = head.c + 2; break;
    }
    const totalDist = pathLen + exitDist;
    const totalPixels = totalDist * spacing;
    const speed = spacing * 24;
    const duration = Math.max(80, (totalPixels / speed) * 1000);
    anims.set(idx, { type: 'fly', startTime: performance.now(), duration, totalDist, slideT: 0 });
    startAnimLoop();
  }

  function blockerDist(idx) {
    const a = arrows[idx];
    const dir = headDir(a);
    const head = a.path[a.path.length - 1];
    const otherDots = new Set();
    for (let i = 0; i < arrows.length; i++) {
      if (i === idx || !arrows[i].alive || anims.has(i)) continue;
      for (const p of arrows[i].path) otherDots.add(`${p.c},${p.r}`);
    }
    let c = head.c + DX[dir], r = head.r + DY[dir];
    let dist = 1;
    while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
      if (otherDots.has(`${c},${r}`)) return dist;
      c += DX[dir]; r += DY[dir];
      dist++;
    }
    return -1;
  }

  function bounce(idx, gridDist) {
    const a = arrows[idx];
    const dir = headDir(a);
    const bounceDist = gridDist * spacing;
    anims.set(idx, { type: 'bounce', startTime: performance.now(), duration: 250, bounceDist, dx: DX[dir], dy: DY[dir], offX: 0, offY: 0 });
    startAnimLoop();
  }

  function resetCam() {
    camScale = 1; camOffX = 0; camOffY = 0;
    console.log('resetCam: scale=' + camScale + ' offX=' + camOffX + ' offY=' + camOffY);
  }

  function clampCam() {
    const fitScale = 1;
    const freeThreshold = fitScale * 1.3;
    if (camScale >= freeThreshold) return;

    const gw = (COLS - 1) * spacing;
    const gh = (ROWS - 1) * spacing;
    const rw = gw * camScale;
    const rh = gh * camScale;
    const t = Math.max(0, 1 - (camScale - fitScale) / (fitScale * 0.3));
    const mx = rw * 0.33 * t;
    const my = rh * 0.33 * t;

    const minX = -mx - originX * camScale;
    const maxX = canvas.width + mx - originX * camScale - rw;
    if (minX < maxX) {
      camOffX = Math.max(minX, Math.min(maxX, camOffX));
    } else {
      camOffX = (minX + maxX) / 2;
    }

    const hdrBottom = document.getElementById('hdr').getBoundingClientRect().bottom;
    const hdrMinY = hdrBottom - originY * camScale;
    const minY = Math.max(hdrMinY, -my - originY * camScale);
    const maxY = canvas.height + my - originY * camScale - rh;
    if (minY < maxY) {
      camOffY = Math.max(minY, Math.min(maxY, camOffY));
    } else {
      camOffY = Math.max(hdrMinY, (minY + maxY) / 2);
    }
  }

  function zoomAt(sx, sy, factor) {
    const newScale = Math.max(0.5, Math.min(5, camScale * factor));
    const wx = (sx - camOffX) / camScale;
    const wy = (sy - camOffY) / camScale;
    camScale = newScale;
    camOffX = sx - wx * camScale;
    camOffY = sy - wy * camScale;
    clampCam();
  }

  function handleClick(px, py) {
    if (cleared) return false;
    const wx = (px - camOffX) / camScale;
    const wy = (py - camOffY) / camScale;
    for (let i = 0; i < arrows.length; i++) {
      if (!arrows[i].alive || anims.has(i)) continue;
      if (hitTest(wx, wy, arrows[i])) {
        const dist = blockerDist(i);
        if (dist > 0) {
          errors++;
          updateUI();
          bounce(i, dist);
        } else {
          fly(i);
        }
        return true;
      }
    }
    return false;
  }

  // --- Mouse pan / click ---
  let dragging = false, dragMoved = false;
  let dragStartX = 0, dragStartY = 0;
  let mouseLastX = 0, mouseLastY = 0;

  canvas.addEventListener('mousedown', (e) => {
    dragging = true;
    dragMoved = false;
    dragStartX = mouseLastX = e.clientX;
    dragStartY = mouseLastY = e.clientY;
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - mouseLastX;
    const dy = e.clientY - mouseLastY;
    mouseLastX = e.clientX;
    mouseLastY = e.clientY;
    if (!dragMoved && Math.hypot(e.clientX - dragStartX, e.clientY - dragStartY) > 3) {
      dragMoved = true;
    }
    if (dragMoved) { camOffX += dx; camOffY += dy; clampCam(); render(); }
  });
  window.addEventListener('mouseup', (e) => {
    if (dragging && !dragMoved) handleClick(e.clientX, e.clientY);
    dragging = false; dragMoved = false;
  });
  canvas.addEventListener('mouseleave', () => { dragging = false; dragMoved = false; });
  canvas.addEventListener('dblclick', (e) => { resetCam(); render(); });

  // --- Scroll-wheel zoom ---
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, e.deltaY > 0 ? 0.9 : 1.1);
    render();
  }, { passive: false });

  // --- Touch pan / pinch-zoom / tap ---
  let touchStartX = 0, touchStartY = 0;
  let lastTouchX = 0, lastTouchY = 0;
  let touchMoved = false;
  let lastPinchDist = 0, lastPinchCX = 0, lastPinchCY = 0;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
      touchStartX = lastTouchX = e.touches[0].clientX;
      touchStartY = lastTouchY = e.touches[0].clientY;
      touchMoved = false;
    } else if (e.touches.length === 2) {
      touchMoved = true;
      lastPinchDist = Math.hypot(
        e.touches[1].clientX - e.touches[0].clientX,
        e.touches[1].clientY - e.touches[0].clientY);
      lastPinchCX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      lastPinchCY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
      if (!touchMoved && Math.hypot(tx - touchStartX, ty - touchStartY) > 8) {
        touchMoved = true;
      }
      if (touchMoved) {
        camOffX += tx - lastTouchX;
        camOffY += ty - lastTouchY;
        clampCam();
        render();
      }
      lastTouchX = tx; lastTouchY = ty;
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[1].clientX - e.touches[0].clientX,
        e.touches[1].clientY - e.touches[0].clientY);
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      if (lastPinchDist > 0) zoomAt(cx, cy, dist / lastPinchDist);
      camOffX += cx - lastPinchCX;
      camOffY += cy - lastPinchCY;
      clampCam();
      lastPinchDist = dist;
      lastPinchCX = cx; lastPinchCY = cy;
      render();
    }
  }, { passive: false });

  let lastTapTime = 0;
  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (e.touches.length === 0 && !touchMoved) {
      const t = e.changedTouches[0];
      const hit = handleClick(t.clientX, t.clientY);
      if (!hit) {
        const now = Date.now();
        if (now - lastTapTime < 300) { resetCam(); render(); lastTapTime = 0; }
        else { lastTapTime = now; }
      }
    }
    if (e.touches.length === 1) {
      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
      lastPinchDist = 0;
    }
    if (e.touches.length === 0) { touchMoved = false; lastPinchDist = 0; }
  }, { passive: false });

  const PALETTE = ['#e05555', '#e08030', '#8855cc', '#6688cc'];
  function arrowColor(idx) {
    const ep = getEffectiveParams();
    if (ep.color === 'bw') return '#ffffff';
    if (ep.color === 'mono') return '#e94560';
    return PALETTE[idx % PALETTE.length];
  }

  function randBends() {
    const ep = getEffectiveParams();
    return randInt(ep.minBends, ep.maxBends);
  }

  function toggleSettings() {
    const p = document.getElementById('panel');
    if (p.style.display === 'flex') {
      p.style.display = 'none';
      return;
    }
    ['difficulty', 'color', 'dots'].forEach(name => {
      const el = p.querySelector(`input[name=${name}][value="${settings[name]}"]`);
      if (el) el.checked = true;
    });
    p.style.display = 'flex';
  }

  function updateUI() {
    document.getElementById('lvl').textContent = 'Level ' + level;
    document.getElementById('err').textContent = 'Errors: ' + errors;
  }

  function useHint() {
    if (cleared) return;
    if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
    for (const a of arrows) a.glowing = false;
    hints++;
    for (let i = 0; i < arrows.length; i++) {
      if (!arrows[i].alive) continue;
      if (blockerDist(i) < 0) {
        arrows[i].glowing = true;
        render();
        hintTimer = setTimeout(() => {
          arrows[i].glowing = false;
          hintTimer = null;
          render();
        }, 800);
        return;
      }
    }
  }

  function showClearScreen() {
    const cs = document.getElementById('clear-screen');
    cs.querySelector('.cs-lvl').textContent = 'Level ' + level;
    cs.querySelector('.cs-err').textContent = errors + ' Error' + (errors !== 1 ? 's' : '');
    const covEl = cs.querySelector('.cs-cov');
    const covPct = lastCoverage >= 100 ? '100%' : lastCoverage.toFixed(1) + '%';
    const nmin = countFree(arrows);
    covEl.textContent = covPct + ' Coverage · Nmin=' + nmin;
    covEl.style.color = lastCoverage >= 100 ? '#4ade80' : 'rgba(255,255,255,0.5)';
    cs.style.display = 'flex';
  }

  function nextLevel() {
    document.getElementById('clear-screen').style.display = 'none';
    level++;
    errors = 0;
    hints = 0;
    cleared = false;
    const ep = getEffectiveParams();
    N = ep.arrows;
    resetCam();
    generateWithTimer();
  }

  function applySettings() {
    settings.difficulty = document.querySelector('input[name=difficulty]:checked').value;
    settings.color = document.querySelector('input[name=color]:checked').value;
    settings.dots = document.querySelector('input[name=dots]:checked').value;
    localStorage.setItem('arrowPuzzleSettings', JSON.stringify(settings));
    const ep = getEffectiveParams();
    N = ep.arrows;
    COLS = ep.cols; ROWS = ep.rows;
    devMode = false;
    document.getElementById('dev-wm').style.display = 'none';
    document.getElementById('dev-sidebar').style.display = 'none';
    document.getElementById('panel').style.display = 'none';
    document.getElementById('clear-screen').style.display = 'none';
    if (animLoop) { cancelAnimationFrame(animLoop); animLoop = null; } anims.clear();
    errors = 0; hints = 0; cleared = false;
    layout();
    resetCam();
    generateWithTimer();
  }

  function showDevPw() {
    const box = document.getElementById('dev-pw');
    const inp = document.getElementById('dev-pw-input');
    if (box.style.display === 'flex') { hideDevPw(); return; }
    box.style.display = 'flex';
    inp.value = '';
    inp.focus();
  }

  function hideDevPw() {
    document.getElementById('dev-pw').style.display = 'none';
    document.getElementById('dev-pw-input').value = '';
  }

  document.getElementById('dev-pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (this.value === 'edz') { hideDevPw(); openDevPanel(); }
      else { hideDevPw(); }
    } else if (e.key === 'Escape') { hideDevPw(); }
  });

  document.getElementById('dev-pw-input').addEventListener('blur', function() {
    setTimeout(hideDevPw, 100);
  });

  function devRestoreFromSettings() {
    const p = DIFFICULTY_PRESETS[settings.difficulty];
    document.getElementById('dp-cols').value = p.grid;
    document.getElementById('dp-rows').value = p.grid;
    document.getElementById('dp-minseg').value = p.minSeg;
    document.getElementById('dp-maxseg').value = p.maxSeg;
    document.getElementById('dp-minbends').value = 0;
    document.getElementById('dp-maxbends').value = p.bends === 'simple' ? 2 : 4;
    document.getElementById('dp-fill').value = p.fill;
    document.getElementById('dp-nmin-min').value = p.nminMin;
    document.getElementById('dp-nmin-max').value = p.nminMax;
    document.getElementById('dp-timeout').value = p.timeout;
    document.getElementById('dp-color').value = '';
    document.getElementById('dp-dots').value = '';
  }

  function openDevPanel() {
    const preserved = JSON.parse(localStorage.getItem('arrowPuzzleDevParams') || 'null');
    if (preserved) {
      Object.assign(devParams, preserved);
      document.getElementById('dp-preserve').checked = true;
    }
    document.getElementById('dp-cols').value = devParams.cols;
    document.getElementById('dp-rows').value = devParams.rows;
    document.getElementById('dp-minseg').value = devParams.minSeg;
    document.getElementById('dp-maxseg').value = devParams.maxSeg;
    document.getElementById('dp-minbends').value = devParams.minBends;
    document.getElementById('dp-maxbends').value = devParams.maxBends;
    document.getElementById('dp-fill').value = devParams.fill;
    document.getElementById('dp-nmin-min').value = devParams.nminMin;
    document.getElementById('dp-nmin-max').value = devParams.nminMax;
    document.getElementById('dp-timeout').value = devParams.timeout;
    document.getElementById('dp-color').value = devParams.color;
    document.getElementById('dp-dots').value = devParams.dots;
    document.getElementById('devpanel').style.display = 'flex';
  }

  function readDevInputs() {
    devParams.cols = parseInt(document.getElementById('dp-cols').value) || 15;
    devParams.rows = parseInt(document.getElementById('dp-rows').value) || 15;
    devParams.minSeg = parseInt(document.getElementById('dp-minseg').value) || 1;
    devParams.maxSeg = parseInt(document.getElementById('dp-maxseg').value) || 5;
    devParams.minBends = parseInt(document.getElementById('dp-minbends').value) || 0;
    devParams.maxBends = parseInt(document.getElementById('dp-maxbends').value) || 4;
    devParams.fill = document.getElementById('dp-fill').value;
    devParams.nminMin = parseInt(document.getElementById('dp-nmin-min').value) || 0;
    devParams.nminMax = parseInt(document.getElementById('dp-nmin-max').value) || 4;
    devParams.timeout = parseInt(document.getElementById('dp-timeout').value) || 5;
    devParams.color = document.getElementById('dp-color').value;
    devParams.dots = document.getElementById('dp-dots').value;
    if (document.getElementById('dp-preserve').checked) {
      localStorage.setItem('arrowPuzzleDevParams', JSON.stringify(devParams));
    } else {
      localStorage.removeItem('arrowPuzzleDevParams');
    }
  }

  function closeDevPanel() {
    document.getElementById('devpanel').style.display = 'none';
  }

  function updateDevSidebar() {
    const sb = document.getElementById('dev-sidebar');
    if (!devMode) { sb.style.display = 'none'; return; }
    const ep = getEffectiveParams();
    sb.style.display = '';
    sb.innerHTML =
      '<b style="color:#e94560">DEV</b><br>' +
      'cols: ' + ep.cols + '<br>' +
      'rows: ' + ep.rows + '<br>' +
      'fill: ' + ep.fill + '<br>' +
      'Nmin: ' + ep.nminMin + '-' + ep.nminMax + '<br>' +
      'bends: ' + ep.minBends + '-' + ep.maxBends + '<br>' +
      'seg: ' + ep.minSeg + '-' + ep.maxSeg + '<br>' +
      'color: ' + (ep.color || settings.color) + '<br>' +
      'dots: ' + (ep.dots || settings.dots) + '<br>' +
      'timeout: ' + ep.timeout + 's';
  }

  function devApply() {
    readDevInputs();
    devMode = true;
    const ep = getEffectiveParams();
    COLS = ep.cols;
    ROWS = ep.rows;
    N = ep.arrows;
    document.getElementById('dev-wm').style.display = 'block';
    document.getElementById('devpanel').style.display = 'none';
    updateDevSidebar();

    document.getElementById('clear-screen').style.display = 'none';
    if (animLoop) { cancelAnimationFrame(animLoop); animLoop = null; } anims.clear();
    errors = 0; hints = 0; cleared = false;
    layout();
    resetCam();
    generateWithTimer();
  }

  function devGenerate() { devApply(); }

  async function devTimeIt() {
    readDevInputs();
    devMode = true;
    const ep = getEffectiveParams();
    COLS = ep.cols;
    ROWS = ep.rows;
    N = ep.arrows;
    document.getElementById('devpanel').style.display = 'none';
    document.getElementById('dev-wm').style.display = 'block';
    updateDevSidebar();

    document.getElementById('clear-screen').style.display = 'none';
    if (animLoop) { cancelAnimationFrame(animLoop); animLoop = null; } anims.clear();
    layout();
    const times = [];
    for (let run = 0; run < 10; run++) {
      const t0 = performance.now();
      await placeArrows();
      times.push(performance.now() - t0);
    }
    times.sort((a, b) => a - b);
    const avg = times.reduce((s, t) => s + t, 0) / times.length;
    console.log(`Generation benchmark (10 runs): avg=${avg.toFixed(1)}ms min=${times[0].toFixed(1)}ms max=${times[times.length-1].toFixed(1)}ms`);
    resetCam();
    errors = 0; hints = 0; cleared = false;
    updateUI();
    render();
  }

  function startGenTimer() {
    genStartTime = Date.now();
    const el = document.getElementById('gen-timer');
    el.textContent = '0.0s';
    if (genTimerInterval) clearInterval(genTimerInterval);
    genTimerInterval = setInterval(() => {
      el.textContent = ((Date.now() - genStartTime) / 1000).toFixed(1) + 's';
    }, 100);
  }

  function stopGenTimer() {
    if (genTimerInterval) { clearInterval(genTimerInterval); genTimerInterval = null; }
    const elapsed = ((Date.now() - genStartTime) / 1000).toFixed(1);
    document.getElementById('gen-timer').textContent = elapsed + 's';
  }

  function generateWithTimer() {
    document.getElementById('hdr').style.display = '';
    startGenTimer();
    updateUI();
    setTimeout(async () => {
      await placeArrows();
      stopGenTimer();
      render();
    }, 50);
  }

  function startGame() {
    const btn = document.querySelector('#start-screen button');
    btn.classList.add('btn-active');
    setTimeout(() => {
      document.getElementById('start-screen').style.display = 'none';
      layout();
      resetCam();
      generateWithTimer();
    }, 400);
  }

  function init() {
    const preserved = JSON.parse(localStorage.getItem('arrowPuzzleDevParams') || 'null');
    if (preserved) {
      Object.assign(devParams, preserved);
      devMode = true;
      const ep = getEffectiveParams();
      COLS = ep.cols; ROWS = ep.rows; N = ep.arrows;
      document.getElementById('dev-wm').style.display = 'block';
      updateDevSidebar();
    }
    layout();
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    btn.classList.add('btn-active');
    setTimeout(() => btn.classList.remove('btn-active'), 150);
  });

  requestAnimationFrame(() => { init(); });
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    if (w === lastWinW && h === lastWinH) return;
    lastWinW = w; lastWinH = h;
    if (animLoop) { cancelAnimationFrame(animLoop); animLoop = null; } anims.clear();
    layout();
    resetCam();
    render();
  });
</script>
</body>
</html>
