<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Puzzle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  #hdr {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px; z-index: 10; color: #fff; font-family: sans-serif;
    pointer-events: none;
  }
  #hdr > * { pointer-events: auto; }
  #lvl { font-size: 16px; font-weight: bold; }
  #err { font-size: 14px; color: rgba(255,255,255,0.7); }
  #hdr-r { display: flex; gap: 8px; align-items: center; }
  #hint-btn {
    background: rgba(255,255,255,0.15); border: none; border-radius: 8px;
    color: #fff; font-size: 14px; padding: 6px 12px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #hint-btn:hover { background: rgba(255,255,255,0.3); }
  #gear {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
    color: #fff; font-size: 20px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #gear:hover { background: rgba(255,255,255,0.3); }
  #clear-screen {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26,26,46,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 15; color: #fff; font-family: sans-serif;
  }
  .cs { text-align: center; }
  .cs-lvl { font-size: 48px; font-weight: bold; margin-bottom: 8px; }
  .cs-err { font-size: 20px; color: rgba(255,255,255,0.6); margin-bottom: 28px; }
  .cs button {
    background: #e94560; border: none; border-radius: 8px;
    color: #fff; font-size: 18px; padding: 12px 32px; cursor: pointer;
  }
  .cs button:hover { background: #d63850; }
  #panel {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
  }
  .pi {
    background: #1a1a2e; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px; padding: 24px; color: #fff;
    font-family: sans-serif; min-width: 260px; max-height: 90vh; overflow-y: auto;
  }
  .pi h2 { margin-bottom: 12px; font-size: 18px; }
  .pi .gl { display: block; margin-top: 14px; margin-bottom: 4px; font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
  .pi label { display: block; padding: 3px 0; font-size: 14px; cursor: pointer; }
  .pi input[type=radio] { margin-right: 6px; }
  .pi .btns { display: flex; gap: 10px; margin-top: 20px; }
  .pi button {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    color: #fff; font-size: 15px; cursor: pointer;
  }
  .pi .apply { background: #e94560; }
  .pi .apply:hover { background: #d63850; }
  .pi .cancel { background: rgba(255,255,255,0.15); }
  .pi .cancel:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hdr">
  <span id="lvl">Level 1</span>
  <span id="err">Errors: 0</span>
  <div id="hdr-r">
    <button id="hint-btn" onclick="useHint()">Hint</button>
    <button id="gear" onclick="openSettings()">&#9881;</button>
  </div>
</div>
<div id="clear-screen" style="display:none">
  <div class="cs">
    <div class="cs-lvl">Level 1</div>
    <div class="cs-err">0 Errors</div>
    <button onclick="nextLevel()">Next Level</button>
  </div>
</div>
<div id="panel" style="display:none">
  <div class="pi">
    <h2>Settings</h2>
    <span class="gl">Grid Size</span>
    <label><input type="radio" name="grid" value="10"> Small (10&times;10)</label>
    <label><input type="radio" name="grid" value="15"> Medium (15&times;15)</label>
    <label><input type="radio" name="grid" value="20"> Large (20&times;20)</label>
    <span class="gl">Arrow Count</span>
    <label><input type="radio" name="arrows" value="15"> Light (15)</label>
    <label><input type="radio" name="arrows" value="35"> Medium (35)</label>
    <label><input type="radio" name="arrows" value="55"> Dense (55)</label>
    <span class="gl">Max Bends</span>
    <label><input type="radio" name="bends" value="straight"> Straight (0)</label>
    <label><input type="radio" name="bends" value="simple"> Simple (1-2)</label>
    <label><input type="radio" name="bends" value="complex"> Complex (2-4)</label>
    <span class="gl">Color</span>
    <label><input type="radio" name="color" value="multi"> Multicolor</label>
    <label><input type="radio" name="color" value="mono"> Monochrome</label>
    <label><input type="radio" name="color" value="bw"> Black &amp; White</label>
    <div class="btns">
      <button class="cancel" onclick="document.getElementById('panel').style.display='none'">Cancel</button>
      <button class="apply" onclick="applySettings()">Apply</button>
    </div>
  </div>
</div>
<script>
  // Grid size counts dots, not gaps (e.g. 15 means 15 dots across with 14 gaps between them)
  const DEFAULTS = { grid: 15, arrows: 35, bends: 'complex', color: 'mono' };
  let settings = Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem('arrowPuzzleSettings') || '{}'));
  let N = settings.arrows;
  let GRID = settings.grid;
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let spacing, originX, originY;
  let arrows = [];
  let busy = false;
  let flyAnim = null;
  let flyingIdx = -1;
  let flyOffX = 0, flyOffY = 0;
  let cleared = false;
  let camScale = 1, camOffX = 0, camOffY = 0;
  let slideT = 0;
  let level = 1, errors = 0, hints = 0;
  let clearTimer = null, hintTimer = null;

  function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

  function layout() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const usable = Math.min(canvas.width, canvas.height) * 0.85;
    spacing = usable / (GRID - 1);
    originX = (canvas.width - usable) / 2;
    originY = (canvas.height - usable) / 2;
  }

  function gx(col) { return originX + col * spacing; }
  function gy(row) { return originY + row * spacing; }

  function drawDots() {
    const r = Math.max(2, spacing * 0.04);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    for (let row = 0; row < GRID; row++) {
      for (let col = 0; col < GRID; col++) {
        ctx.beginPath();
        ctx.arc(gx(col), gy(row), r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function headDir(a) {
    const p = a.path;
    const last = p[p.length - 1];
    const prev = p[p.length - 2];
    const dc = last.c - prev.c;
    const dr = last.r - prev.r;
    if (dc === 0 && dr < 0) return 0;
    if (dc > 0 && dr === 0) return 1;
    if (dc === 0 && dr > 0) return 2;
    return 3;
  }

  function generateArrow(numBends, occupied) {
    for (let attempt = 0; attempt < 200; attempt++) {
      const path = [];
      const visited = new Set();
      let col = randInt(2, GRID - 3);
      let row = randInt(2, GRID - 3);
      let dir = randInt(0, 3);
      let valid = true;

      const key0 = `${col},${row}`;
      if (occupied && occupied.has(key0)) continue;
      path.push({ c: col, r: row });
      visited.add(key0);

      const segLens = [];
      for (let seg = 0; seg <= numBends; seg++) {
        let maxSteps;
        switch (dir) {
          case 0: maxSteps = row; break;
          case 1: maxSteps = GRID - 1 - col; break;
          case 2: maxSteps = GRID - 1 - row; break;
          case 3: maxSteps = col; break;
        }
        if (maxSteps < 1) { valid = false; break; }
        const minSteps = seg >= 2 ? segLens[seg - 2] + 1 : 1;
        if (minSteps > maxSteps) { valid = false; break; }
        const maxSeg = Math.min(maxSteps, 5);
        const steps = Math.random() < 0.6 ? randInt(minSteps, Math.min(maxSeg, Math.max(minSteps, 2))) : randInt(minSteps, maxSeg);
        segLens.push(steps);

        for (let s = 1; s <= steps; s++) {
          const nc = col + DX[dir] * s;
          const nr = row + DY[dir] * s;
          const key = `${nc},${nr}`;
          if (visited.has(key) || (occupied && occupied.has(key))) { valid = false; break; }
          visited.add(key);
          path.push({ c: nc, r: nr });
        }
        if (!valid) break;

        col += DX[dir] * steps;
        row += DY[dir] * steps;

        if (seg < numBends) {
          dir = Math.random() < 0.5 ? (dir + 1) % 4 : (dir + 3) % 4;
        }
      }

      if (valid && path.length >= 2) {
        const last = path[path.length - 1];
        const prev = path[path.length - 2];
        const hdc = Math.sign(last.c - prev.c);
        const hdr = Math.sign(last.r - prev.r);
        const headProj = hdc * last.c + hdr * last.r;
        let extremeOk = true;
        for (const p of path) {
          if (hdc * p.c + hdr * p.r > headProj) { extremeOk = false; break; }
        }
        if (extremeOk) return { path, alive: true, stuck: false, glowing: false };
      }
    }
    return null;
  }

  function headsConflict(a, b) {
    const da = headDir(a);
    const db = headDir(b);
    if ((da + 2) % 4 !== db) return false;
    const ha = a.path[a.path.length - 1];
    const hb = b.path[b.path.length - 1];
    if (da === 0 || da === 2) return ha.c === hb.c;
    return ha.r === hb.r;
  }

  function isSolvable(list) {
    const remaining = list.map(a => ({ path: a.path, dir: headDir(a) }));
    while (remaining.length > 0) {
      let found = false;
      for (let i = 0; i < remaining.length; i++) {
        const a = remaining[i];
        const head = a.path[a.path.length - 1];
        const otherDots = new Set();
        for (let j = 0; j < remaining.length; j++) {
          if (j === i) continue;
          for (const p of remaining[j].path) otherDots.add(`${p.c},${p.r}`);
        }
        let blocked = false;
        let c = head.c + DX[a.dir], r = head.r + DY[a.dir];
        while (c >= 0 && c < GRID && r >= 0 && r < GRID) {
          if (otherDots.has(`${c},${r}`)) { blocked = true; break; }
          c += DX[a.dir]; r += DY[a.dir];
        }
        if (!blocked) {
          remaining.splice(i, 1);
          found = true;
          break;
        }
      }
      if (!found) return false;
    }
    return true;
  }

  function placeArrows() {
    for (let puzzleAttempt = 0; puzzleAttempt < 200; puzzleAttempt++) {
      const occupied = new Set();
      const generated = [];
      let success = true;

      for (let n = 0; n < N; n++) {
        let placed = false;
        for (let retry = 0; retry < 50; retry++) {
          const bends = randBends();
          const candidate = generateArrow(bends, occupied);
          if (!candidate) continue;
          let conflict = false;
          for (const existing of generated) {
            if (headsConflict(candidate, existing)) { conflict = true; break; }
          }
          if (!conflict) {
            generated.push(candidate);
            for (const p of candidate.path) occupied.add(`${p.c},${p.r}`);
            placed = true;
            break;
          }
        }
        if (!placed) { success = false; break; }
      }

      if (success && isSolvable(generated)) {
        arrows = generated;
        if (puzzleAttempt >= 50) console.warn('Puzzle generation took ' + (puzzleAttempt + 1) + ' attempts');
        console.log('Puzzle generated (' + puzzleAttempt + ' attempts):');
        for (let i = 0; i < arrows.length; i++) {
          console.log('  Arrow ' + i + ' (' + arrows[i].path.length + ' dots, head dir=' + headDir(arrows[i]) + '):',
            arrows[i].path.map(p => `(${p.c},${p.r})`).join(' → '));
        }
        cleared = false;
        return;
      }
    }
    console.warn('Could not generate solvable puzzle, using minimal fallback');
    arrows = [{ path: [{c:2,r:5},{c:3,r:5},{c:4,r:5}], alive: true, stuck: false, glowing: false }];
    cleared = false;
  }

  function drawArrow(a, offX, offY, color, glow) {
    const p = a.path;
    const lineW = Math.max(2.5, spacing * 0.055);
    const headLen = spacing * 0.3;
    const headW = spacing * 0.2;
    const dir = headDir(a);
    const perpX = -DY[dir];
    const perpY = DX[dir];

    const tipX = gx(p[p.length - 1].c) + offX;
    const tipY = gy(p[p.length - 1].r) + offY;
    const baseX = tipX - DX[dir] * headLen;
    const baseY = tipY - DY[dir] * headLen;

    if (glow) {
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = spacing * 0.4;
    }

    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(gx(p[0].c) + offX, gy(p[0].r) + offY);
    for (let i = 1; i < p.length; i++) {
      ctx.lineTo(gx(p[i].c) + offX, gy(p[i].r) + offY);
    }
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(baseX + perpX * headW, baseY + perpY * headW);
    ctx.lineTo(baseX - perpX * headW, baseY - perpY * headW);
    ctx.closePath();
    ctx.fill();

    if (glow) {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  }

  function posOnPath(path, dir, d) {
    const pathLen = path.length - 1;
    if (d <= 0) {
      return { x: gx(path[0].c), y: gy(path[0].r) };
    } else if (d >= pathLen) {
      const excess = d - pathLen;
      const head = path[path.length - 1];
      return {
        x: gx(head.c) + excess * DX[dir] * spacing,
        y: gy(head.r) + excess * DY[dir] * spacing
      };
    } else {
      const seg = Math.floor(d);
      const frac = d - seg;
      const x1 = gx(path[seg].c), y1 = gy(path[seg].r);
      const x2 = gx(path[seg + 1].c), y2 = gy(path[seg + 1].r);
      return { x: x1 + frac * (x2 - x1), y: y1 + frac * (y2 - y1) };
    }
  }

  function drawSlidingArrow(a, t, color, glow) {
    const p = a.path;
    const dir = headDir(a);
    const pts = [];
    for (let i = 0; i < p.length; i++) pts.push(posOnPath(p, dir, t + i));

    const lineW = Math.max(2.5, spacing * 0.055);
    const headLen = spacing * 0.3;
    const headW = spacing * 0.2;
    const tip = pts[pts.length - 1];
    const pre = pts[pts.length - 2];
    const hdx = tip.x - pre.x, hdy = tip.y - pre.y;
    const hlen = Math.sqrt(hdx * hdx + hdy * hdy) || 1;
    const ux = hdx / hlen, uy = hdy / hlen;
    const px = -uy, py = ux;
    const bx = tip.x - ux * headLen, by = tip.y - uy * headLen;

    if (glow) { ctx.shadowColor = '#ffffff'; ctx.shadowBlur = spacing * 0.4; }

    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y);
    ctx.lineTo(bx + px * headW, by + py * headW);
    ctx.lineTo(bx - px * headW, by - py * headW);
    ctx.closePath();
    ctx.fill();

    if (glow) { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }
  }

  function flyDistance(a) {
    const dir = headDir(a);
    let maxDist = 0;
    for (const p of a.path) {
      let dist;
      switch (dir) {
        case 0: dist = p.r * spacing; break;
        case 1: dist = (GRID - 1 - p.c) * spacing; break;
        case 2: dist = (GRID - 1 - p.r) * spacing; break;
        case 3: dist = p.c * spacing; break;
      }
      maxDist = Math.max(maxDist, dist);
    }
    return maxDist;
  }

  function hitTest(px, py, a) {
    for (let i = 0; i < a.path.length - 1; i++) {
      const x1 = gx(a.path[i].c), y1 = gy(a.path[i].r);
      const x2 = gx(a.path[i + 1].c), y2 = gy(a.path[i + 1].r);
      const dx = x2 - x1, dy = y2 - y1;
      const len2 = dx * dx + dy * dy;
      if (len2 === 0) continue;
      let t = ((px - x1) * dx + (py - y1) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const nx = x1 + t * dx, ny = y1 + t * dy;
      if (Math.sqrt((px - nx) ** 2 + (py - ny) ** 2) < spacing * 0.45) return true;
    }
    return false;
  }

  function render() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.setTransform(camScale, 0, 0, camScale, camOffX, camOffY);

    drawDots();

    ctx.save();
    const clipPad = spacing * 0.3;
    ctx.beginPath();
    ctx.rect(originX - clipPad, originY - clipPad, (GRID - 1) * spacing + clipPad * 2, (GRID - 1) * spacing + clipPad * 2);
    ctx.clip();

    for (let i = 0; i < arrows.length; i++) {
      if (!arrows[i].alive) continue;
      let color = arrowColor(i);
      let glow = false;
      if (arrows[i].glowing) { color = '#ffffff'; glow = true; }
      else if (arrows[i].stuck) { color = '#ffffff'; }
      if (i === flyingIdx && slideT > 0) {
        drawSlidingArrow(arrows[i], slideT, color, glow);
      } else {
        const ox = (i === flyingIdx) ? flyOffX : 0;
        const oy = (i === flyingIdx) ? flyOffY : 0;
        drawArrow(arrows[i], ox, oy, color, glow);
      }
    }

    ctx.restore();
    ctx.restore();
  }

  function fly(idx) {
    busy = true;
    flyingIdx = idx;
    const a = arrows[idx];
    const dir = headDir(a);
    const pathLen = a.path.length - 1;
    const head = a.path[pathLen];
    let exitDist;
    switch (dir) {
      case 0: exitDist = head.r + 2; break;
      case 1: exitDist = GRID - 1 - head.c + 2; break;
      case 2: exitDist = GRID - 1 - head.r + 2; break;
      case 3: exitDist = head.c + 2; break;
    }
    const totalDist = pathLen + exitDist;
    const totalPixels = totalDist * spacing;
    const speed = spacing * 24;
    const duration = Math.max(80, (totalPixels / speed) * 1000);
    const startTime = performance.now();

    function ease(t) { return t * t * (3 - 2 * t); }

    function animate(now) {
      let t = Math.min(1, (now - startTime) / duration);
      t = ease(t);
      slideT = t * totalDist;
      render();
      if (t < 1) {
        flyAnim = requestAnimationFrame(animate);
      } else {
        flyAnim = null;
        flyingIdx = -1;
        slideT = 0;
        a.alive = false;
        if (arrows.every(a => !a.alive)) {
          cleared = true;
          render();
          showClearScreen();
        } else {
          render();
        }
        busy = false;
      }
    }
    flyAnim = requestAnimationFrame(animate);
  }

  function blockerDist(idx) {
    const a = arrows[idx];
    const dir = headDir(a);
    const head = a.path[a.path.length - 1];
    const otherDots = new Set();
    for (let i = 0; i < arrows.length; i++) {
      if (i === idx || !arrows[i].alive) continue;
      for (const p of arrows[i].path) otherDots.add(`${p.c},${p.r}`);
    }
    let c = head.c + DX[dir], r = head.r + DY[dir];
    let dist = 1;
    while (c >= 0 && c < GRID && r >= 0 && r < GRID) {
      if (otherDots.has(`${c},${r}`)) return dist;
      c += DX[dir]; r += DY[dir];
      dist++;
    }
    return -1;
  }

  function bounce(idx, gridDist) {
    busy = true;
    flyingIdx = idx;
    const a = arrows[idx];
    const dir = headDir(a);
    const bounceDist = gridDist * spacing;
    const duration = 250;
    const startTime = performance.now();

    function animate(now) {
      let t = Math.min(1, (now - startTime) / duration);
      const phase = t < 0.5 ? t * 2 : 2 - t * 2;
      flyOffX = DX[dir] * bounceDist * phase;
      flyOffY = DY[dir] * bounceDist * phase;
      render();
      if (t < 1) {
        flyAnim = requestAnimationFrame(animate);
      } else {
        flyAnim = null;
        flyingIdx = -1;
        flyOffX = 0;
        flyOffY = 0;
        a.stuck = true;
        render();
        busy = false;
      }
    }
    flyAnim = requestAnimationFrame(animate);
  }

  function zoomAt(sx, sy, factor) {
    const newScale = Math.max(0.5, Math.min(5, camScale * factor));
    const wx = (sx - camOffX) / camScale;
    const wy = (sy - camOffY) / camScale;
    camScale = newScale;
    camOffX = sx - wx * camScale;
    camOffY = sy - wy * camScale;
  }

  function handleClick(px, py) {
    if (busy) return;
    if (cleared) return;
    const wx = (px - camOffX) / camScale;
    const wy = (py - camOffY) / camScale;
    for (let i = 0; i < arrows.length; i++) {
      if (!arrows[i].alive) continue;
      if (hitTest(wx, wy, arrows[i])) {
        const dist = blockerDist(i);
        if (dist > 0) {
          errors++;
          updateUI();
          bounce(i, dist);
        } else {
          fly(i);
        }
        return;
      }
    }
  }

  // --- Mouse pan / click ---
  let dragging = false, dragMoved = false;
  let dragStartX = 0, dragStartY = 0;
  let mouseLastX = 0, mouseLastY = 0;

  canvas.addEventListener('mousedown', (e) => {
    dragging = true;
    dragMoved = false;
    dragStartX = mouseLastX = e.clientX;
    dragStartY = mouseLastY = e.clientY;
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - mouseLastX;
    const dy = e.clientY - mouseLastY;
    mouseLastX = e.clientX;
    mouseLastY = e.clientY;
    if (!dragMoved && Math.hypot(e.clientX - dragStartX, e.clientY - dragStartY) > 3) {
      dragMoved = true;
    }
    if (dragMoved) { camOffX += dx; camOffY += dy; render(); }
  });
  window.addEventListener('mouseup', (e) => {
    if (dragging && !dragMoved) handleClick(e.clientX, e.clientY);
    dragging = false; dragMoved = false;
  });
  canvas.addEventListener('mouseleave', () => { dragging = false; dragMoved = false; });

  // --- Scroll-wheel zoom ---
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, e.deltaY > 0 ? 0.9 : 1.1);
    render();
  }, { passive: false });

  // --- Touch pan / pinch-zoom / tap ---
  let touchStartX = 0, touchStartY = 0;
  let lastTouchX = 0, lastTouchY = 0;
  let touchMoved = false;
  let lastPinchDist = 0, lastPinchCX = 0, lastPinchCY = 0;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
      touchStartX = lastTouchX = e.touches[0].clientX;
      touchStartY = lastTouchY = e.touches[0].clientY;
      touchMoved = false;
    } else if (e.touches.length === 2) {
      touchMoved = true;
      lastPinchDist = Math.hypot(
        e.touches[1].clientX - e.touches[0].clientX,
        e.touches[1].clientY - e.touches[0].clientY);
      lastPinchCX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      lastPinchCY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
      if (!touchMoved && Math.hypot(tx - touchStartX, ty - touchStartY) > 8) {
        touchMoved = true;
      }
      if (touchMoved) {
        camOffX += tx - lastTouchX;
        camOffY += ty - lastTouchY;
        render();
      }
      lastTouchX = tx; lastTouchY = ty;
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[1].clientX - e.touches[0].clientX,
        e.touches[1].clientY - e.touches[0].clientY);
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      if (lastPinchDist > 0) zoomAt(cx, cy, dist / lastPinchDist);
      camOffX += cx - lastPinchCX;
      camOffY += cy - lastPinchCY;
      lastPinchDist = dist;
      lastPinchCX = cx; lastPinchCY = cy;
      render();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (e.touches.length === 0 && !touchMoved) {
      const t = e.changedTouches[0];
      handleClick(t.clientX, t.clientY);
    }
    if (e.touches.length === 1) {
      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
      lastPinchDist = 0;
    }
    if (e.touches.length === 0) { touchMoved = false; lastPinchDist = 0; }
  }, { passive: false });

  function arrowColor(idx) {
    if (settings.color === 'bw') return '#ffffff';
    if (settings.color === 'mono') return '#e94560';
    return `hsl(${(idx * 137.508) % 360}, 75%, 55%)`;
  }

  function randBends() {
    if (settings.bends === 'straight') return 0;
    if (settings.bends === 'simple') return randInt(0, 2);
    return Math.random() < 0.7 ? randInt(0, 1) : randInt(2, 4);
  }

  function openSettings() {
    const p = document.getElementById('panel');
    ['grid', 'arrows', 'bends', 'color'].forEach(name => {
      const el = p.querySelector(`input[name=${name}][value="${settings[name]}"]`);
      if (el) el.checked = true;
    });
    p.style.display = 'flex';
  }

  function updateUI() {
    document.getElementById('lvl').textContent = 'Level ' + level;
    document.getElementById('err').textContent = 'Errors: ' + errors;
  }

  function useHint() {
    if (busy || cleared) return;
    if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
    for (const a of arrows) a.glowing = false;
    hints++;
    for (let i = 0; i < arrows.length; i++) {
      if (!arrows[i].alive) continue;
      if (blockerDist(i) < 0) {
        arrows[i].glowing = true;
        render();
        hintTimer = setTimeout(() => {
          arrows[i].glowing = false;
          hintTimer = null;
          render();
        }, 800);
        return;
      }
    }
  }

  function showClearScreen() {
    const cs = document.getElementById('clear-screen');
    cs.querySelector('.cs-lvl').textContent = 'Level ' + level;
    cs.querySelector('.cs-err').textContent = errors + ' Error' + (errors !== 1 ? 's' : '');
    cs.style.display = 'flex';
    clearTimer = setTimeout(nextLevel, 3000);
  }

  function nextLevel() {
    if (clearTimer) { clearTimeout(clearTimer); clearTimer = null; }
    document.getElementById('clear-screen').style.display = 'none';
    level++;
    errors = 0;
    hints = 0;
    cleared = false;
    camScale = 1; camOffX = 0; camOffY = 0;
    placeArrows();
    updateUI();
    render();
  }

  function applySettings() {
    settings.grid = parseInt(document.querySelector('input[name=grid]:checked').value);
    settings.arrows = parseInt(document.querySelector('input[name=arrows]:checked').value);
    settings.bends = document.querySelector('input[name=bends]:checked').value;
    settings.color = document.querySelector('input[name=color]:checked').value;
    localStorage.setItem('arrowPuzzleSettings', JSON.stringify(settings));
    N = settings.arrows;
    GRID = settings.grid;
    document.getElementById('panel').style.display = 'none';
    if (clearTimer) { clearTimeout(clearTimer); clearTimer = null; }
    document.getElementById('clear-screen').style.display = 'none';
    if (flyAnim) { cancelAnimationFrame(flyAnim); flyAnim = null; flyingIdx = -1; slideT = 0; busy = false; }
    errors = 0; hints = 0; cleared = false;
    layout();
    camScale = 1; camOffX = 0; camOffY = 0;
    placeArrows();
    updateUI();
    render();
  }

  function init() {
    layout();
    placeArrows();
    render();
  }

  init();
  window.addEventListener('resize', () => {
    if (flyAnim) { cancelAnimationFrame(flyAnim); flyAnim = null; flyingIdx = -1; slideT = 0; busy = false; }
    layout();
    camScale = 1; camOffX = 0; camOffY = 0;
    render();
  });
</script>
</body>
</html>
