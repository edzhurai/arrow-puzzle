<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Puzzle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; cursor: pointer; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const GRID = 12;
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let spacing, originX, originY;
  let arrows = [];
  let busy = false;
  let flyAnim = null;
  let flyingIdx = -1;
  let flyOffX = 0, flyOffY = 0;
  let cleared = false;

  function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

  function layout() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const usable = Math.min(canvas.width, canvas.height) * 0.85;
    spacing = usable / (GRID - 1);
    originX = (canvas.width - usable) / 2;
    originY = (canvas.height - usable) / 2;
  }

  function gx(col) { return originX + col * spacing; }
  function gy(row) { return originY + row * spacing; }

  function drawDots() {
    const r = Math.max(2, spacing * 0.04);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    for (let row = 0; row < GRID; row++) {
      for (let col = 0; col < GRID; col++) {
        ctx.beginPath();
        ctx.arc(gx(col), gy(row), r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function headDir(a) {
    const p = a.path;
    const last = p[p.length - 1];
    const prev = p[p.length - 2];
    const dc = last.c - prev.c;
    const dr = last.r - prev.r;
    if (dc === 0 && dr < 0) return 0;
    if (dc > 0 && dr === 0) return 1;
    if (dc === 0 && dr > 0) return 2;
    return 3;
  }

  function generateArrow(numBends, occupied) {
    for (let attempt = 0; attempt < 200; attempt++) {
      const path = [];
      const visited = new Set();
      let col = randInt(2, GRID - 3);
      let row = randInt(2, GRID - 3);
      let dir = randInt(0, 3);
      let valid = true;

      const key0 = `${col},${row}`;
      if (occupied && occupied.has(key0)) continue;
      path.push({ c: col, r: row });
      visited.add(key0);

      for (let seg = 0; seg <= numBends; seg++) {
        let maxSteps;
        switch (dir) {
          case 0: maxSteps = row; break;
          case 1: maxSteps = GRID - 1 - col; break;
          case 2: maxSteps = GRID - 1 - row; break;
          case 3: maxSteps = col; break;
        }
        if (maxSteps < 1) { valid = false; break; }
        const steps = randInt(1, Math.min(maxSteps, 5));

        for (let s = 1; s <= steps; s++) {
          const nc = col + DX[dir] * s;
          const nr = row + DY[dir] * s;
          const key = `${nc},${nr}`;
          if (visited.has(key) || (occupied && occupied.has(key))) { valid = false; break; }
          visited.add(key);
          path.push({ c: nc, r: nr });
        }
        if (!valid) break;

        col += DX[dir] * steps;
        row += DY[dir] * steps;

        if (seg < numBends) {
          dir = Math.random() < 0.5 ? (dir + 1) % 4 : (dir + 3) % 4;
        }
      }

      if (valid && path.length >= 3) {
        return { path, alive: true, stuck: false, glowing: false };
      }
    }
    return { path: [{c:2,r:5},{c:3,r:5},{c:4,r:5},{c:4,r:4},{c:4,r:3}], alive: true, stuck: false, glowing: false };
  }

  function generateArrowFrom(sc, sr, numBends, occupied) {
    for (let attempt = 0; attempt < 50; attempt++) {
      const path = [];
      const visited = new Set();
      let col = sc, row = sr;
      let dir = randInt(0, 3);
      let valid = true;

      const key0 = `${col},${row}`;
      if (occupied && occupied.has(key0)) return null;
      path.push({ c: col, r: row });
      visited.add(key0);

      for (let seg = 0; seg <= numBends; seg++) {
        let maxSteps;
        switch (dir) {
          case 0: maxSteps = row; break;
          case 1: maxSteps = GRID - 1 - col; break;
          case 2: maxSteps = GRID - 1 - row; break;
          case 3: maxSteps = col; break;
        }
        if (maxSteps < 1) { valid = false; break; }
        const steps = randInt(1, Math.min(maxSteps, 5));

        for (let s = 1; s <= steps; s++) {
          const nc = col + DX[dir] * s;
          const nr = row + DY[dir] * s;
          const key = `${nc},${nr}`;
          if (visited.has(key) || (occupied && occupied.has(key))) { valid = false; break; }
          visited.add(key);
          path.push({ c: nc, r: nr });
        }
        if (!valid) break;

        col += DX[dir] * steps;
        row += DY[dir] * steps;

        if (seg < numBends) {
          dir = Math.random() < 0.5 ? (dir + 1) % 4 : (dir + 3) % 4;
        }
      }

      if (valid && path.length >= 3) {
        return { path, alive: true, stuck: false, glowing: false };
      }
    }
    return null;
  }

  function headsConflict(a, b) {
    const da = headDir(a);
    const db = headDir(b);
    if ((da + 2) % 4 !== db) return false;
    const ha = a.path[a.path.length - 1];
    const hb = b.path[b.path.length - 1];
    if (da === 0 || da === 2) return ha.c === hb.c;
    return ha.r === hb.r;
  }

  function placeArrows() {
    const a1 = generateArrow(randInt(1, 2));
    const occupied = new Set(a1.path.map(p => `${p.c},${p.r}`));
    let a2 = null;

    if (Math.random() < 0.8) {
      const dir = headDir(a1);
      const head = a1.path[a1.path.length - 1];
      const forwardDots = [];
      let c = head.c + DX[dir], r = head.r + DY[dir];
      while (c >= 0 && c < GRID && r >= 0 && r < GRID) {
        if (!occupied.has(`${c},${r}`)) forwardDots.push({ c, r });
        c += DX[dir]; r += DY[dir];
      }

      if (forwardDots.length > 0) {
        const hitType = randInt(0, 2);
        const hitNames = ['tail', 'mid-shaft', 'head'];
        const shuffled = [...forwardDots].sort(() => Math.random() - 0.5);

        for (const target of shuffled) {
          if (hitType === 0) {
            a2 = generateArrowFrom(target.c, target.r, randInt(1, 2), occupied);
          } else if (hitType === 2) {
            a2 = generateArrowFrom(target.c, target.r, randInt(1, 2), occupied);
            if (a2) a2.path.reverse();
          } else {
            const base = generateArrowFrom(target.c, target.r, randInt(0, 1), occupied);
            if (base && base.path.length >= 2) {
              const fdc = Math.sign(base.path[1].c - base.path[0].c);
              const fdr = Math.sign(base.path[1].r - base.path[0].r);
              let fd;
              if (fdc === 0 && fdr < 0) fd = 0;
              else if (fdc > 0 && fdr === 0) fd = 1;
              else if (fdc === 0 && fdr > 0) fd = 2;
              else fd = 3;
              const tailDirs = [0, 1, 2, 3].filter(d => d !== (fd + 2) % 4);
              const td = tailDirs[randInt(0, tailDirs.length - 1)];
              const baseOcc = new Set([...occupied, ...base.path.map(p => `${p.c},${p.r}`)]);
              const tailSteps = randInt(1, 3);
              const preDots = [];
              let ok = true;
              for (let s = tailSteps; s >= 1; s--) {
                const nc = target.c - DX[td] * s;
                const nr = target.r - DY[td] * s;
                if (nc < 0 || nc >= GRID || nr < 0 || nr >= GRID) { ok = false; break; }
                const key = `${nc},${nr}`;
                if (baseOcc.has(key)) { ok = false; break; }
                baseOcc.add(key);
                preDots.push({ c: nc, r: nr });
              }
              if (ok && preDots.length > 0 && preDots.length + base.path.length >= 3) {
                base.path = [...preDots, ...base.path];
                a2 = base;
              }
            }
          }
          if (a2 && headsConflict(a1, a2)) a2 = null;
          if (a2) {
            console.log('Collision: arrow 0 blocked by arrow 1 ' + hitNames[hitType]);
            break;
          }
        }
      }
    }

    if (!a2) {
      for (let retry = 0; retry < 50; retry++) {
        const candidate = generateArrow(randInt(1, 2), occupied);
        if (!headsConflict(a1, candidate)) { a2 = candidate; break; }
      }
    }
    if (!a2) a2 = generateArrow(randInt(1, 2), occupied);
    arrows = [a1, a2];
    for (let i = 0; i < arrows.length; i++) {
      console.log('Arrow ' + i + ' (' + arrows[i].path.length + ' dots, head dir=' + headDir(arrows[i]) + '):',
        arrows[i].path.map(p => `(${p.c},${p.r})`).join(' → '));
    }
    cleared = false;
  }

  function drawArrow(a, offX, offY, color, glow) {
    const p = a.path;
    const lineW = Math.max(2.5, spacing * 0.055);
    const headLen = spacing * 0.3;
    const headW = spacing * 0.2;
    const dir = headDir(a);
    const perpX = -DY[dir];
    const perpY = DX[dir];

    const tipX = gx(p[p.length - 1].c) + offX;
    const tipY = gy(p[p.length - 1].r) + offY;
    const baseX = tipX - DX[dir] * headLen;
    const baseY = tipY - DY[dir] * headLen;

    if (glow) {
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = spacing * 0.4;
    }

    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(gx(p[0].c) + offX, gy(p[0].r) + offY);
    for (let i = 1; i < p.length; i++) {
      ctx.lineTo(gx(p[i].c) + offX, gy(p[i].r) + offY);
    }
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(baseX + perpX * headW, baseY + perpY * headW);
    ctx.lineTo(baseX - perpX * headW, baseY - perpY * headW);
    ctx.closePath();
    ctx.fill();

    if (glow) {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  }

  function flyDistance(a) {
    const dir = headDir(a);
    let maxDist = 0;
    for (const p of a.path) {
      let dist;
      switch (dir) {
        case 0: dist = p.r * spacing; break;
        case 1: dist = (GRID - 1 - p.c) * spacing; break;
        case 2: dist = (GRID - 1 - p.r) * spacing; break;
        case 3: dist = p.c * spacing; break;
      }
      maxDist = Math.max(maxDist, dist);
    }
    return maxDist;
  }

  function hitTest(px, py, a) {
    for (let i = 0; i < a.path.length - 1; i++) {
      const x1 = gx(a.path[i].c), y1 = gy(a.path[i].r);
      const x2 = gx(a.path[i + 1].c), y2 = gy(a.path[i + 1].r);
      const dx = x2 - x1, dy = y2 - y1;
      const len2 = dx * dx + dy * dy;
      if (len2 === 0) continue;
      let t = ((px - x1) * dx + (py - y1) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const nx = x1 + t * dx, ny = y1 + t * dy;
      if (Math.sqrt((px - nx) ** 2 + (py - ny) ** 2) < spacing * 0.45) return true;
    }
    return false;
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawDots();

    ctx.save();
    const clipPad = spacing * 0.3;
    ctx.beginPath();
    ctx.rect(originX - clipPad, originY - clipPad, (GRID - 1) * spacing + clipPad * 2, (GRID - 1) * spacing + clipPad * 2);
    ctx.clip();

    for (let i = 0; i < arrows.length; i++) {
      if (!arrows[i].alive) continue;
      const ox = (i === flyingIdx) ? flyOffX : 0;
      const oy = (i === flyingIdx) ? flyOffY : 0;
      let color = '#e94560';
      let glow = false;
      if (arrows[i].glowing) { color = '#ffffff'; glow = true; }
      else if (arrows[i].stuck) { color = '#ffffff'; }
      drawArrow(arrows[i], ox, oy, color, glow);
    }

    ctx.restore();

    if (cleared) {
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${spacing * 1.2}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Clear!', canvas.width / 2, canvas.height / 2);
    }
  }

  function fly(idx) {
    busy = true;
    flyingIdx = idx;
    const a = arrows[idx];
    const dir = headDir(a);
    const dist = flyDistance(a);
    const speed = spacing * 12;
    const duration = Math.max(80, (dist / speed) * 1000);
    const startTime = performance.now();

    function ease(t) { return t * t * (3 - 2 * t); }

    function animate(now) {
      let t = Math.min(1, (now - startTime) / duration);
      t = ease(t);
      const d = t * dist;
      flyOffX = DX[dir] * d;
      flyOffY = DY[dir] * d;
      render();
      if (t < 1) {
        flyAnim = requestAnimationFrame(animate);
      } else {
        flyAnim = null;
        flyingIdx = -1;
        flyOffX = 0;
        flyOffY = 0;
        a.alive = false;
        if (arrows.every(a => !a.alive)) {
          cleared = true;
          render();
          setTimeout(() => { placeArrows(); render(); }, 1000);
        } else {
          render();
        }
        busy = false;
      }
    }
    flyAnim = requestAnimationFrame(animate);
  }

  function blockerDist(idx) {
    const a = arrows[idx];
    const dir = headDir(a);
    const head = a.path[a.path.length - 1];
    const otherDots = new Set();
    for (let i = 0; i < arrows.length; i++) {
      if (i === idx || !arrows[i].alive) continue;
      for (const p of arrows[i].path) otherDots.add(`${p.c},${p.r}`);
    }
    let c = head.c + DX[dir], r = head.r + DY[dir];
    let dist = 1;
    while (c >= 0 && c < GRID && r >= 0 && r < GRID) {
      if (otherDots.has(`${c},${r}`)) return dist;
      c += DX[dir]; r += DY[dir];
      dist++;
    }
    return -1;
  }

  function bounce(idx, gridDist) {
    busy = true;
    flyingIdx = idx;
    const a = arrows[idx];
    const dir = headDir(a);
    const bounceDist = gridDist * spacing;
    const duration = 250;
    const startTime = performance.now();

    function animate(now) {
      let t = Math.min(1, (now - startTime) / duration);
      const phase = t < 0.5 ? t * 2 : 2 - t * 2;
      flyOffX = DX[dir] * bounceDist * phase;
      flyOffY = DY[dir] * bounceDist * phase;
      render();
      if (t < 1) {
        flyAnim = requestAnimationFrame(animate);
      } else {
        flyAnim = null;
        flyingIdx = -1;
        flyOffX = 0;
        flyOffY = 0;
        a.stuck = true;
        render();
        busy = false;
      }
    }
    flyAnim = requestAnimationFrame(animate);
  }

  function handleClick(px, py) {
    if (busy) return;
    if (cleared) return;
    for (let i = 0; i < arrows.length; i++) {
      if (!arrows[i].alive) continue;
      if (hitTest(px, py, arrows[i])) {
        const dist = blockerDist(i);
        if (dist > 0) {
          bounce(i, dist);
        } else {
          fly(i);
        }
        return;
      }
    }
  }

  canvas.addEventListener('click', (e) => handleClick(e.clientX, e.clientY));
  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    handleClick(t.clientX, t.clientY);
  });

  function init() {
    layout();
    placeArrows();
    render();
  }

  init();
  window.addEventListener('resize', () => {
    if (flyAnim) { cancelAnimationFrame(flyAnim); flyAnim = null; flyingIdx = -1; busy = false; }
    layout();
    render();
  });
</script>
</body>
</html>
