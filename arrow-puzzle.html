<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Puzzle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; cursor: pointer; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const GRID = 12;
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let spacing, originX, originY;
  let arrows = [];
  let busy = false;
  let flyAnim = null;
  let flyingIdx = -1;
  let flyOffX = 0, flyOffY = 0;
  let cleared = false;

  function layout() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const usable = Math.min(canvas.width, canvas.height) * 0.85;
    spacing = usable / (GRID - 1);
    originX = (canvas.width - usable) / 2;
    originY = (canvas.height - usable) / 2;
  }

  function gx(col) { return originX + col * spacing; }
  function gy(row) { return originY + row * spacing; }

  function drawDots() {
    const r = Math.max(2, spacing * 0.04);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    for (let row = 0; row < GRID; row++) {
      for (let col = 0; col < GRID; col++) {
        ctx.beginPath();
        ctx.arc(gx(col), gy(row), r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function arrowDots(a) {
    const dots = [];
    for (let i = 0; i <= a.len; i++) {
      dots.push({ c: a.col - DX[a.dir] * i, r: a.row - DY[a.dir] * i });
    }
    return dots;
  }

  function dotsOverlap(a, b) {
    const da = arrowDots(a);
    const db = arrowDots(b);
    for (const pa of da)
      for (const pb of db)
        if (pa.c === pb.c && pa.r === pb.r) return true;
    return false;
  }

  function isHeadOn(a, b) {
    if (a.col === b.col) {
      if (a.dir === 0 && b.dir === 2 && b.row < a.row) return true;
      if (a.dir === 2 && b.dir === 0 && b.row > a.row) return true;
    }
    if (a.row === b.row) {
      if (a.dir === 1 && b.dir === 3 && b.col > a.col) return true;
      if (a.dir === 3 && b.dir === 1 && b.col < a.col) return true;
    }
    return false;
  }

  function maxShaft(col, row, d) {
    switch (d) {
      case 0: return GRID - 1 - row;
      case 1: return col;
      case 2: return row;
      case 3: return GRID - 1 - col;
    }
  }

  function makeArrow() {
    let a;
    do {
      const d = Math.floor(Math.random() * 4);
      const col = Math.floor(Math.random() * GRID);
      const row = Math.floor(Math.random() * GRID);
      const mx = maxShaft(col, row, d);
      if (mx < 1) continue;
      a = { col, row, dir: d, len: 1 + Math.floor(Math.random() * mx), alive: true, stuck: false, glowing: false };
    } while (!a);
    return a;
  }

  function placeArrows() {
    arrows[0] = makeArrow();
    let attempts = 0;
    do {
      arrows[1] = makeArrow();
      attempts++;
    } while ((dotsOverlap(arrows[0], arrows[1]) || isHeadOn(arrows[0], arrows[1]) || isHeadOn(arrows[1], arrows[0])) && attempts < 500);
    cleared = false;
  }

  function drawArrow(a, offX, offY, color, glow) {
    const hx = gx(a.col) + offX;
    const hy = gy(a.row) + offY;
    const tx = hx - DX[a.dir] * a.len * spacing;
    const ty = hy - DY[a.dir] * a.len * spacing;

    const lineW = Math.max(2.5, spacing * 0.055);
    const headLen = spacing * 0.3;
    const headW = spacing * 0.18;
    const px = -DY[a.dir];
    const py = DX[a.dir];

    if (glow) {
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = spacing * 0.4;
    }

    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(hx, hy);
    ctx.stroke();

    const tipX = hx + DX[a.dir] * headLen;
    const tipY = hy + DY[a.dir] * headLen;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(hx + px * headW - DX[a.dir] * lineW * 0.3, hy + py * headW - DY[a.dir] * lineW * 0.3);
    ctx.lineTo(hx - px * headW - DX[a.dir] * lineW * 0.3, hy - py * headW - DY[a.dir] * lineW * 0.3);
    ctx.closePath();
    ctx.fill();

    if (glow) {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  }

  function isBlocked(idx) {
    const a = arrows[idx];
    const j = 1 - idx;
    if (!arrows[j].alive) return false;
    const otherDots = arrowDots(arrows[j]);
    let c = a.col + DX[a.dir];
    let r = a.row + DY[a.dir];
    while (c >= 0 && c < GRID && r >= 0 && r < GRID) {
      for (const d of otherDots)
        if (d.c === c && d.r === r) return true;
      c += DX[a.dir];
      r += DY[a.dir];
    }
    return false;
  }

  function flyDistance(a) {
    const tailCol = a.col - DX[a.dir] * a.len;
    const tailRow = a.row - DY[a.dir] * a.len;
    switch (a.dir) {
      case 0: return tailRow * spacing;
      case 1: return (GRID - 1 - tailCol) * spacing;
      case 2: return (GRID - 1 - tailRow) * spacing;
      case 3: return tailCol * spacing;
    }
  }

  function hitTest(px, py, a) {
    const hx = gx(a.col);
    const hy = gy(a.row);
    const tx = hx - DX[a.dir] * a.len * spacing;
    const ty = hy - DY[a.dir] * a.len * spacing;
    const dx = hx - tx;
    const dy = hy - ty;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return false;
    let t = ((px - tx) * dx + (py - ty) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const nx = tx + t * dx;
    const ny = ty + t * dy;
    const dist = Math.sqrt((px - nx) ** 2 + (py - ny) ** 2);
    return dist < spacing * 0.45;
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawDots();

    ctx.save();
    const clipPad = spacing * 0.3;
    ctx.beginPath();
    ctx.rect(originX - clipPad, originY - clipPad, (GRID - 1) * spacing + clipPad * 2, (GRID - 1) * spacing + clipPad * 2);
    ctx.clip();

    for (let i = 0; i < 2; i++) {
      if (!arrows[i].alive) continue;
      const ox = (i === flyingIdx) ? flyOffX : 0;
      const oy = (i === flyingIdx) ? flyOffY : 0;
      let color = '#e94560';
      let glow = false;
      if (arrows[i].glowing) { color = '#ffffff'; glow = true; }
      else if (arrows[i].stuck) { color = '#ffffff'; }
      drawArrow(arrows[i], ox, oy, color, glow);
    }

    ctx.restore();

    if (cleared) {
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${spacing * 1.2}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Clear!', canvas.width / 2, canvas.height / 2);
    }
  }

  function bounce(idx) {
    busy = true;
    flyingIdx = idx;
    const a = arrows[idx];
    const wasStuck = a.stuck;
    a.stuck = true;
    const bounceDist = spacing * 0.35;
    const duration = 300;
    const startTime = performance.now();

    function animate(now) {
      let t = Math.min(1, (now - startTime) / duration);
      const d = Math.sin(t * Math.PI) * bounceDist;
      flyOffX = DX[a.dir] * d;
      flyOffY = DY[a.dir] * d;
      a.glowing = wasStuck && t > 0.3 && t < 0.7;
      render();
      if (t < 1) {
        flyAnim = requestAnimationFrame(animate);
      } else {
        flyAnim = null;
        flyingIdx = -1;
        flyOffX = 0;
        flyOffY = 0;
        a.glowing = false;
        render();
        busy = false;
      }
    }
    flyAnim = requestAnimationFrame(animate);
  }

  function fly(idx) {
    busy = true;
    flyingIdx = idx;
    const a = arrows[idx];
    const dist = flyDistance(a);
    const speed = spacing * 12;
    const duration = Math.max(80, (dist / speed) * 1000);
    const startTime = performance.now();

    function ease(t) { return t * t * (3 - 2 * t); }

    function animate(now) {
      let t = Math.min(1, (now - startTime) / duration);
      t = ease(t);
      const d = t * dist;
      flyOffX = DX[a.dir] * d;
      flyOffY = DY[a.dir] * d;
      render();
      if (t < 1) {
        flyAnim = requestAnimationFrame(animate);
      } else {
        flyAnim = null;
        flyingIdx = -1;
        flyOffX = 0;
        flyOffY = 0;
        a.alive = false;
        if (!arrows[0].alive && !arrows[1].alive) cleared = true;
        render();
        busy = false;
      }
    }
    flyAnim = requestAnimationFrame(animate);
  }

  function handleClick(px, py) {
    if (busy) return;
    if (cleared) return;
    for (let i = 0; i < 2; i++) {
      if (!arrows[i].alive) continue;
      if (hitTest(px, py, arrows[i])) {
        if (isBlocked(i)) bounce(i);
        else fly(i);
        return;
      }
    }
  }

  canvas.addEventListener('click', (e) => handleClick(e.clientX, e.clientY));
  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    handleClick(t.clientX, t.clientY);
  });

  function init() {
    layout();
    placeArrows();
    render();
  }

  init();
  window.addEventListener('resize', () => {
    if (flyAnim) { cancelAnimationFrame(flyAnim); flyAnim = null; flyingIdx = -1; busy = false; }
    layout();
    render();
  });
</script>
</body>
</html>
